directories:
  output: dist
  buildResources: assets
appId: com.salahtimes.app
productName: Salah Times
copyright: Copyright © 2024 Salah Times
files:
  - filter:
      - main.js
      - preload.js
      - src/**/*
      - assets/**/*
extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*'
  - from: quran
    to: quran
    filter:
      - '**/*.mp3'
  - from: nashed
    to: nashed
    filter:
      - '**/*'
  - filter:
      - azan.mp3
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico
  requestedExecutionLevel: asInvoker
  publisherName: Salah Times
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Salah Times
  runAfterFinish: true
  menuCategory: Islamic Apps
portable:
  artifactName: SalahTimes-Portable-${version}.exe
publish: null
electronVersion: 28.3.3
