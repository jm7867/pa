<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
	<title>Prayer Times</title>
	<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #0a0c10;
			--surface: rgba(255, 255, 255, 0.04);
			--surface2: rgba(255, 255, 255, 0.07);
			--border: rgba(255, 255, 255, 0.08);
			--gold: #c9a84c;
			--gold-light: #e8c97a;
			--gold-dim: rgba(201, 168, 76, 0.15);
			--teal: #4ecdc4;
			--text: #f0ede8;
			--muted: rgba(240, 237, 232, 0.45);
			--now-bg: rgba(201, 168, 76, 0.12);
			--done-bg: rgba(255, 255, 255, 0.03);
			--accent: #7c9ee8;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			-webkit-tap-highlight-color: transparent;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: var(--bg);
			font-family: 'Outfit', sans-serif;
			color: var(--text);
			user-select: none;
		}

		/* Subtle starfield bg */
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			z-index: 0;
			background:
				radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201, 168, 76, 0.07) 0%, transparent 60%),
				radial-gradient(ellipse 40% 30% at 80% 100%, rgba(78, 205, 196, 0.05) 0%, transparent 50%),
				radial-gradient(ellipse 30% 30% at 10% 80%, rgba(124, 158, 232, 0.05) 0%, transparent 50%);
			pointer-events: none;
		}

		/* Decorative top arc */
		body::after {
			content: '';
			position: fixed;
			top: -1px;
			left: 50%;
			transform: translateX(-50%);
			width: 600px;
			height: 2px;
			z-index: 0;
			background: linear-gradient(90deg, transparent, var(--gold), transparent);
			pointer-events: none;
		}

		.app {
			position: relative;
			z-index: 1;
			display: grid;
			grid-template-columns: 340px 1fr;
			grid-template-rows: auto 1fr;
			height: 100vh;
			gap: 0;
		}

		/* ── LEFT PANEL ── */
		.left-panel {
			grid-row: 1 / 3;
			display: flex;
			flex-direction: column;
			padding: 28px 20px;
			border-right: 1px solid var(--border);
			gap: 16px;
			overflow: hidden;
		}

		/* Mosque silhouette SVG watermark */
		.mosque-mark {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			height: 160px;
			opacity: 0.04;
			display: flex;
			align-items: flex-end;
			justify-content: center;
			pointer-events: none;
		}

		.location-chip {
			display: flex;
			align-items: center;
			gap: 8px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 50px;
			padding: 8px 16px;
			font-size: 13px;
			font-weight: 300;
			color: var(--muted);
			letter-spacing: 0.4px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.location-chip::before {
			content: '◉';
			color: #4ade80;
			font-size: 9px;
		}

		/* Clock */
		.clock-block {
			text-align: center;
			padding: 14px 0 8px;
		}

		.clock-time {
			font-family: 'Cormorant Garamond', serif;
			font-size: 78px;
			font-weight: 300;
			letter-spacing: -2px;
			line-height: 1;
			color: var(--text);
		}

		.clock-ampm {
			font-family: 'Outfit', sans-serif;
			font-size: 18px;
			font-weight: 200;
			color: var(--muted);
			letter-spacing: 3px;
			text-transform: uppercase;
			margin-left: 4px;
		}

		.clock-date {
			font-size: 12px;
			font-weight: 300;
			color: var(--gold);
			letter-spacing: 1.2px;
			text-transform: uppercase;
			margin-top: 6px;
		}

		.clock-hijri {
			font-family: 'Cormorant Garamond', serif;
			font-size: 20px;
			font-style: italic;
			color: var(--muted);
			margin-top: 2px;
		}

		/* Current prayer highlight */
		.current-block {
			background: var(--now-bg);
			border: 1px solid rgba(201, 168, 76, 0.25);
			border-radius: 16px;
			padding: 18px 20px;
			position: relative;
			overflow: hidden;
		}

		.current-block::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 1px;
			background: linear-gradient(90deg, transparent, var(--gold), transparent);
		}

		.current-label {
			font-size: 11px;
			font-weight: 400;
			text-transform: uppercase;
			letter-spacing: 2px;
			color: var(--gold);
			margin-bottom: 6px;
		}

		.current-name {
			font-family: 'Cormorant Garamond', serif;
			font-size: 42px;
			font-weight: 300;
			line-height: 1.1;
			color: var(--text);
		}

		.current-time {
			font-size: 18px;
			font-weight: 200;
			color: var(--muted);
			margin-top: 2px;
		}

		.next-countdown {
			margin-top: 12px;
			padding-top: 12px;
			border-top: 1px solid var(--border);
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.next-label {
			font-size: 11px;
			color: var(--muted);
			letter-spacing: 1px;
			text-transform: uppercase;
		}

		.next-value {
			font-family: 'Cormorant Garamond', serif;
			font-size: 22px;
			font-weight: 400;
			color: var(--teal);
			letter-spacing: 1px;
		}

		/* Weather strip */
		.weather-strip {
			display: flex;
			align-items: center;
			gap: 10px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 12px 16px;
			font-size: 13px;
			font-weight: 300;
			color: var(--muted);
		}

		.weather-icon {
			font-size: 22px;
		}

		/* Control buttons */
		.controls-row {
			display: flex;
			gap: 8px;
			margin-top: auto;
		}

		.ctrl-btn {
			flex: 1;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 12px;
			color: var(--muted);
			font-size: 18px;
			cursor: pointer;
			transition: all 0.2s;
			text-align: center;
			font-family: inherit;
		}

		.ctrl-btn:hover {
			background: var(--surface2);
			color: var(--text);
			border-color: rgba(255, 255, 255, 0.15);
		}

		.ctrl-btn.active-btn {
			color: var(--gold);
			border-color: rgba(201, 168, 76, 0.3);
		}

		/* ── RIGHT PANEL TOP ── */
		.top-bar {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 20px 28px 0;
		}

		.section-title {
			font-family: 'Cormorant Garamond', serif;
			font-size: 28px;
			font-weight: 300;
			font-style: italic;
			color: var(--text);
			flex: 1;
		}

		.tab-group {
			display: flex;
			gap: 4px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 3px;
		}

		.tab-btn {
			background: none;
			border: none;
			padding: 6px 16px;
			font-family: 'Outfit', sans-serif;
			font-size: 12px;
			font-weight: 400;
			letter-spacing: 1px;
			text-transform: uppercase;
			color: var(--muted);
			border-radius: 7px;
			cursor: pointer;
			transition: all 0.2s;
		}

		.tab-btn.active {
			background: var(--surface2);
			color: var(--text);
		}

		/* ── RIGHT PANEL CONTENT ── */
		.right-content {
			padding: 16px 28px 20px;
			display: flex;
			flex-direction: column;
			gap: 16px;
			overflow: hidden;
		}

		/* Calendar */
		.calendar-strip {
			display: flex;
			gap: 6px;
			overflow-x: auto;
			scrollbar-width: none;
			padding-bottom: 4px;
		}

		.calendar-strip::-webkit-scrollbar {
			display: none;
		}

		.cal-day {
			min-width: 52px;
			flex-shrink: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 4px;
			padding: 10px 8px;
			border-radius: 12px;
			border: 1px solid var(--border);
			background: var(--surface);
			cursor: pointer;
			transition: all 0.2s;
		}

		.cal-day:hover {
			background: var(--surface2);
			border-color: rgba(255, 255, 255, 0.14);
		}

		.cal-day.active {
			background: var(--gold-dim);
			border-color: rgba(201, 168, 76, 0.4);
		}

		.cal-day.active .cal-num {
			color: var(--gold-light);
		}

		.cal-wday {
			font-size: 10px;
			font-weight: 300;
			color: var(--muted);
			letter-spacing: 1px;
			text-transform: uppercase;
		}

		.cal-num {
			font-family: 'Cormorant Garamond', serif;
			font-size: 24px;
			font-weight: 400;
			color: var(--text);
			line-height: 1;
		}

		/* Prayer grid */
		.prayer-grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 10px;
			flex: 1;
		}

		.prayer-card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 16px;
			display: flex;
			flex-direction: column;
			gap: 6px;
			position: relative;
			overflow: hidden;
			transition: all 0.25s;
		}

		.prayer-card::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 1px;
			background: transparent;
			transition: background 0.3s;
		}

		.prayer-card.now {
			background: var(--now-bg);
			border-color: rgba(201, 168, 76, 0.3);
		}

		.prayer-card.now::before {
			background: linear-gradient(90deg, transparent, var(--gold), transparent);
		}

		.prayer-card.done {
			background: var(--done-bg);
			opacity: 0.55;
		}

		.pc-name {
			font-size: 11px;
			font-weight: 400;
			text-transform: uppercase;
			letter-spacing: 2px;
			color: var(--muted);
		}

		.prayer-card.now .pc-name {
			color: var(--gold);
		}

		.pc-time {
			font-family: 'Cormorant Garamond', serif;
			font-size: 30px;
			font-weight: 300;
			color: var(--text);
			line-height: 1;
		}

		.pc-ampm {
			font-size: 12px;
			font-weight: 200;
			color: var(--muted);
			letter-spacing: 1px;
		}

		.pc-tag {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			margin-top: 4px;
			font-size: 10px;
			letter-spacing: 1.5px;
			text-transform: uppercase;
			padding: 3px 8px;
			border-radius: 20px;
			width: fit-content;
		}

		.now-pill {
			background: rgba(201, 168, 76, 0.15);
			color: var(--gold-light);
			border: 1px solid rgba(201, 168, 76, 0.3);
		}

		.now-pill::before {
			content: '●';
			font-size: 7px;
			animation: pulse 1.5s infinite;
		}

		@keyframes pulse {

			0%,
			100% {
				opacity: 1
			}

			50% {
				opacity: 0.3
			}
		}

		.done-pill {
			background: rgba(255, 255, 255, 0.05);
			color: var(--muted);
			border: 1px solid var(--border);
		}

		/* Quran Player */
		.player-card {
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 16px 20px;
			display: flex;
			align-items: center;
			gap: 16px;
		}

		.player-info {
			flex: 1;
			min-width: 0;
		}

		.player-surah {
			font-family: 'Cormorant Garamond', serif;
			font-size: 20px;
			font-weight: 400;
			color: var(--text);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.player-sub {
			font-size: 11px;
			font-weight: 300;
			color: var(--muted);
			letter-spacing: 1px;
			margin-top: 2px;
		}

		.player-btns {
			display: flex;
			gap: 6px;
			align-items: center;
		}

		.p-btn {
			width: 38px;
			height: 38px;
			border-radius: 10px;
			border: 1px solid var(--border);
			background: var(--surface2);
			color: var(--text);
			font-size: 14px;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: inherit;
		}

		.p-btn:hover {
			background: rgba(255, 255, 255, 0.1);
			border-color: rgba(255, 255, 255, 0.2);
		}

		.p-btn.play-main {
			width: 46px;
			height: 46px;
			font-size: 16px;
			background: linear-gradient(135deg, var(--teal), #44a08d);
			border-color: transparent;
			box-shadow: 0 4px 16px rgba(78, 205, 196, 0.25);
			color: #0a0c10;
		}

		.player-progress {
			display: flex;
			align-items: center;
			gap: 8px;
			min-width: 180px;
		}

		input[type="range"] {
			-webkit-appearance: none;
			appearance: none;
			height: 3px;
			border-radius: 3px;
			background: rgba(255, 255, 255, 0.12);
			cursor: pointer;
			flex: 1;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 13px;
			height: 13px;
			border-radius: 50%;
			background: var(--gold);
			cursor: pointer;
			box-shadow: 0 0 6px rgba(201, 168, 76, 0.5);
		}

		input[type="range"]#volume {
			width: 60px;
			flex: 0 0 60px;
		}

		.p-status {
			font-size: 11px;
			color: var(--muted);
			letter-spacing: 0.5px;
			white-space: nowrap;
		}

		audio {
			display: none;
		}

		/* Decorative geometric */
		.geo-ring {
			position: fixed;
			width: 500px;
			height: 500px;
			border-radius: 50%;
			border: 1px solid rgba(201, 168, 76, 0.05);
			top: 50%;
			right: -200px;
			transform: translateY(-50%);
			pointer-events: none;
			z-index: 0;
		}

		.geo-ring:nth-child(2) {
			width: 350px;
			height: 350px;
			border-color: rgba(124, 158, 232, 0.04);
			right: -120px;
		}

	</style>
</head>

<body>
	<div class="geo-ring"></div>
	<div class="geo-ring" style="width:350px;height:350px;right:-120px;border-color:rgba(124,158,232,0.04)"></div>

	<div class="app">
		<!-- LEFT PANEL -->
		<div class="left-panel" style="position:relative">
			<div class="location-chip" id="location">Locating…</div>

			<div class="clock-block">
				<div><span class="clock-time" id="clock-h">--</span><span style="font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:300;color:var(--muted)">:</span><span class="clock-time" id="clock-m">--</span><span style="font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:300;color:var(--muted)">:</span><span class="clock-time" id="clock-s" style="font-size:48px;color:var(--muted)">--</span> <span class="clock-ampm" id="clock-ap">AM</span></div>
				<div class="clock-date" id="greg-date">—</div>
				<div class="clock-hijri" id="hijri-date">—</div>
			</div>

			<div class="current-block">
				<div class="current-label">Now in prayer</div>
				<div class="current-name" id="current-name">—</div>
				<div class="current-time" id="current-time">—</div>
				<div class="next-countdown">
					<span class="next-label">Next prayer</span>
					<span class="next-value" id="next-countdown">—</span>
				</div>
			</div>

			<div class="weather-strip">
				<span class="weather-icon">🌡</span>
				<span id="weather-text">Loading weather…</span>
			</div>

			<div class="controls-row">
				<button class="ctrl-btn" id="mute-btn" title="Toggle Azan sound">🔊</button>
				<button class="ctrl-btn" id="refresh-btn" title="Refresh">⟳</button>
				<button class="ctrl-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
			</div>

			<!-- Mosque watermark -->
			<div class="mosque-mark">
				<svg viewBox="0 0 400 140" width="360" fill="white">
					<rect x="170" y="30" width="60" height="110" />
					<ellipse cx="200" cy="30" rx="30" ry="30" />
					<rect x="140" y="60" width="40" height="80" />
					<rect x="220" y="60" width="40" height="80" />
					<ellipse cx="160" cy="60" rx="20" ry="20" />
					<ellipse cx="240" cy="60" rx="20" ry="20" />
					<rect x="100" y="90" width="30" height="50" />
					<rect x="270" y="90" width="30" height="50" />
					<ellipse cx="115" cy="90" rx="15" ry="15" />
					<ellipse cx="285" cy="90" rx="15" ry="15" />
					<rect x="0" y="138" width="400" height="2" />
					<!-- minarets tops -->
					<polygon points="115,55 122,90 108,90" />
					<polygon points="285,55 292,90 278,90" />
					<polygon points="200,0 208,30 192,30" />
				</svg>
			</div>
		</div>

		<!-- RIGHT TOP -->
		<div class="top-bar">
			<div class="section-title">Prayer Times</div>
			<div class="tab-group">
				<button class="tab-btn active" id="tab-week" onclick="showWeek()">2 Weeks</button>
				<button class="tab-btn" id="tab-month" onclick="showMonth()">Month</button>
			</div>
		</div>

		<!-- RIGHT CONTENT -->
		<div class="right-content">
			<div class="calendar-strip" id="calendar"></div>
			<div class="prayer-grid" id="prayer-grid"></div>

			<!-- Quran Player -->
			<div class="player-card">
				<div class="player-info">
					<div class="player-surah">Surah <span id="surah-name">Al-Fatiha</span></div>
					<div class="player-sub">Mishari Al-Afasi · <span id="p-status">Ready</span></div>
				</div>
				<div class="player-btns">
					<button class="p-btn" id="prev">⏮</button>
					<button class="p-btn play-main" id="play">▶</button>
					<button class="p-btn" id="next">⏭</button>
				</div>
				<div class="player-progress">
					<span style="font-size:11px;color:var(--muted)">⏳</span>
					<input type="range" id="progress" min="0" max="100" value="0" step="0.1">
					<span style="font-size:11px;color:var(--muted)">🔊</span>
					<input type="range" id="volume" min="0" max="1" step="0.01" value="0.4">
				</div>
			</div>
		</div>
	</div>

	<audio id="azan-audio" src="azan.mp3" preload="auto"></audio>
	<audio id="quran-audio" preload="metadata"></audio>

	<script>
		// ─── GLOBALS ───
		let userCoords = null;
		let todayPrayerTimes = [];
		let azanPlayedFor = null;
		let isMuted = false;
		let selectedDate = new Date();
		const azanAudio = document.getElementById('azan-audio');

		const $ = id => document.getElementById(id);

		// ─── CLOCK ───
		function updateClock() {
			const now = new Date();
			let h = now.getHours(),
				m = now.getMinutes(),
				s = now.getSeconds();
			const ap = h >= 12 ? 'PM' : 'AM';
			h = h % 12 || 12;
			$('clock-h').textContent = String(h).padStart(2, '0');
			$('clock-m').textContent = String(m).padStart(2, '0');
			$('clock-s').textContent = String(s).padStart(2, '0');
			$('clock-ap').textContent = ap;
		}
		setInterval(updateClock, 1000);
		updateClock();

		// ─── FORMAT HELPERS ───
		function fmt12(timeStr) {
			const [h, m] = timeStr.split(':').map(Number);
			const ap = h >= 12 ? 'PM' : 'AM';
			const hh = h % 12 || 12;
			return {
				time: `${hh}:${String(m).padStart(2,'0')}`,
				ampm: ap
			};
		}

		function getTimeObj(timeStr, date) {
			const [h, m, s = 0] = timeStr.split(':').map(Number);
			const t = new Date(date);
			t.setHours(h, m, s, 0);
			return t;
		}

		// ─── WEATHER ───
		async function fetchWeather(lat, lon) {
			try {
				const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weathercode&temperature_unit=fahrenheit`);
				const d = await r.json();
				const wcode = d.current.weathercode;
				const icons = {
					0: '☀️',
					1: '🌤',
					2: '⛅',
					3: '☁️',
					45: '🌫',
					48: '🌫',
					51: '🌦',
					61: '🌧',
					71: '🌨',
					80: '🌦',
					95: '⛈',
					96: '⛈'
				};
				const icon = icons[wcode] || '🌡';
				$('weather-text').textContent = `${icon}  ${d.current.temperature_2m}°F  ·  💨 ${d.current.wind_speed_10m} km/h`;
			} catch {
				$('weather-text').textContent = 'Weather unavailable';
			}
		}

		// ─── PRAYER TIMES ───
		async function fetchPrayerTimes(date) {
			if (!userCoords || !navigator.onLine) return;
			selectedDate = date;
			todayPrayerTimes = [];
			azanPlayedFor = null;

			const {
				latitude: lat,
				longitude: lon
			} = userCoords;
			const d = date.getDate(),
				mo = date.getMonth() + 1,
				yr = date.getFullYear();
			const url = `https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=2&month=${mo}&year=${yr}&school=1`;

			try {
				const res = await fetch(url);
				const json = await res.json();
				if (json.code !== 200) throw new Error();
				const today = json.data[d - 1];
				const timings = today.timings;
				const hijri = today.date.hijri;

				$('greg-date').textContent = date.toLocaleDateString('en-US', {
					weekday: 'short',
					month: 'short',
					day: '2-digit',
					year: 'numeric'
				}).toUpperCase();
				$('hijri-date').textContent = `${hijri.day} ${hijri.month.en} ${hijri.year}`;

				const order = [{
						name: 'Imsak',
						key: 'Imsak'
					},
					{
						name: 'Fajr',
						key: 'Fajr'
					},
					{
						name: 'Sunrise',
						key: 'Sunrise'
					},
					{
						name: 'Ishraq',
						key: 'Ishraq',
						derived: true,
						after: 22
					},
					{
						name: 'Zuhr',
						key: 'Dhuhr'
					},
					{
						name: 'Asr',
						key: 'Asr'
					},
					{
						name: 'Maghrib',
						key: 'Maghrib'
					},
					{
						name: "Isha'a",
						key: 'Isha'
					},
				];

				for (const p of order) {
					let ts;
					if (p.derived) {
						const raw = timings['Sunrise'].split(' ')[0];
						const [sh, sm] = raw.split(':').map(Number);
						const tot = sh * 60 + sm + p.after;
						ts = `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}:00`;
					} else {
						if (!timings[p.key]) continue;
						ts = timings[p.key].split(' ')[0];
						if (ts.length === 5) ts += ':00';
					}
					todayPrayerTimes.push({
						key: p.key,
						name: p.name,
						time: getTimeObj(ts, date),
						ts
					});
				}

				renderPrayers();
				updateCurrentPrayer();
				startCountdown();
			} catch (e) {
				console.error(e);
			}
		}

		function renderPrayers() {
			const now = new Date();
			const grid = $('prayer-grid');
			grid.innerHTML = '';

			let currentPrayer = null;

			for (let i = 0; i < todayPrayerTimes.length; i++) {
				const p = todayPrayerTimes[i];
				const next = todayPrayerTimes[i + 1];
				const isNow = now >= p.time && (!next || now < next.time);
				const isDone = !isNow && now >= p.time;
				if (isNow) currentPrayer = p;

				const {
					time,
					ampm
				} = fmt12(p.ts);
				const card = document.createElement('div');
				card.className = `prayer-card${isNow?' now':isDone?' done':''}`;
				card.innerHTML = `
      <div class="pc-name">${p.name}</div>
      <div class="pc-time">${time} <span class="pc-ampm">${ampm}</span></div>
      ${isNow ? `<div class="pc-tag now-pill">now</div>` : isDone ? `<div class="pc-tag done-pill">✓ done</div>` : ''}
    `;
				grid.appendChild(card);
			}

			// Update current block
			if (currentPrayer) {
				$('current-name').textContent = currentPrayer.name;
				const {
					time,
					ampm
				} = fmt12(currentPrayer.ts);
				$('current-time').textContent = `${time} ${ampm}`;
			} else {
				$('current-name').textContent = '—';
				$('current-time').textContent = '—';
			}
		}

		function updateCurrentPrayer() {
			const now = new Date();
			let current = null;
			for (let i = 0; i < todayPrayerTimes.length; i++) {
				const p = todayPrayerTimes[i];
				const next = todayPrayerTimes[i + 1];
				if (now >= p.time && (!next || now < next.time)) {
					current = p;
					break;
				}
			}
			if (current) {
				$('current-name').textContent = current.name;
				const {
					time,
					ampm
				} = fmt12(current.ts);
				$('current-time').textContent = `${time} ${ampm}`;
			}
		}

		let countdownTimer = null;

		function startCountdown() {
			if (countdownTimer) clearInterval(countdownTimer);
			countdownTimer = setInterval(() => {
				const now = new Date();
				const next = todayPrayerTimes.find(p => p.time > now);
				if (next) {
					let diff = next.time - now;
					const h = Math.floor(diff / 3600000);
					const m = Math.floor((diff % 3600000) / 60000);
					const s = Math.floor((diff % 60000) / 1000);
					$('next-countdown').textContent = `${next.name}  ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
				} else {
					$('next-countdown').textContent = 'All done ✦';
				}
			}, 1000);
		}

		// ─── AZAN ───
		setInterval(() => {
			if (!todayPrayerTimes.length || isMuted) return;
			const now = new Date();
			for (const p of todayPrayerTimes) {
				const diff = now - p.time;
				if (diff >= 0 && diff < 19000 && azanPlayedFor !== p.key) {
					azanAudio.currentTime = 0;
					azanAudio.play().catch(() => {});
					azanPlayedFor = p.key;
				}
			}
		}, 1000);

		// ─── CALENDAR ───
		function showWeek() {
			$('tab-week').classList.add('active');
			$('tab-month').classList.remove('active');
			const cal = $('calendar');
			cal.innerHTML = '';
			const now = new Date();
			const start = new Date(now);
			start.setDate(now.getDate() - now.getDay());

			for (let i = 0; i < 14; i++) {
				const date = new Date(start);
				date.setDate(start.getDate() + i);
				const isToday = date.toDateString() === new Date().toDateString();
				const el = document.createElement('div');
				el.className = `cal-day${isToday?' active':''}`;
				el.innerHTML = `<span class="cal-wday">${date.toLocaleDateString('en-US',{weekday:'short'})}</span><span class="cal-num">${date.getDate()}</span>`;
				el.addEventListener('click', () => {
					document.querySelectorAll('.cal-day').forEach(e => e.classList.remove('active'));
					el.classList.add('active');
					fetchPrayerTimes(date);
				});
				cal.appendChild(el);
			}
		}

		function showMonth() {
			$('tab-week').classList.remove('active');
			$('tab-month').classList.add('active');
			const cal = $('calendar');
			cal.innerHTML = '';
			const now = new Date();
			const year = now.getFullYear(),
				month = now.getMonth();
			const days = new Date(year, month + 1, 0).getDate();
			const first = new Date(year, month, 1).getDay();

			for (let i = 0; i < first; i++) {
				const empty = document.createElement('div');
				empty.className = 'cal-day';
				empty.style.visibility = 'hidden';
				cal.appendChild(empty);
			}
			for (let d = 1; d <= days; d++) {
				const date = new Date(year, month, d);
				const isToday = d === now.getDate();
				const el = document.createElement('div');
				el.className = `cal-day${isToday?' active':''}`;
				el.innerHTML = `<span class="cal-wday">${date.toLocaleDateString('en-US',{weekday:'short'})}</span><span class="cal-num">${d}</span>`;
				el.addEventListener('click', () => {
					document.querySelectorAll('.cal-day').forEach(e => e.classList.remove('active'));
					el.classList.add('active');
					fetchPrayerTimes(date);
				});
				cal.appendChild(el);
			}
		}

		// ─── CONTROLS ───
		$('mute-btn').addEventListener('click', async () => {
			isMuted = !isMuted;
			azanAudio.muted = isMuted;
			$('mute-btn').textContent = isMuted ? '🔇' : '🔊';
			if (!isMuted) {
				try {
					await azanAudio.play();
					azanAudio.pause();
					azanAudio.currentTime = 0;
				} catch {}
			}
		});

		$('refresh-btn').addEventListener('click', () => {
			if (userCoords) {
				fetchPrayerTimes(selectedDate);
				fetchWeather(userCoords.latitude, userCoords.longitude);
			}
		});

		$('fullscreen-btn').addEventListener('click', () => {
			if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
			else document.exitFullscreen();
		});
		document.addEventListener('fullscreenchange', () => {
			$('fullscreen-btn').textContent = document.fullscreenElement ? '⤢' : '⛶';
		});

		// ─── GEO ───
		navigator.geolocation.getCurrentPosition(async pos => {
			userCoords = pos.coords;
			try {
				const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
				const j = await r.json();
				const place = j.address && (j.address.city || j.address.town || j.address.village || j.address.state) || 'Your Location';
				$('location').textContent = '  ' + place;
			} catch {
				$('location').textContent = '  Location';
			}
			fetchPrayerTimes(new Date());
			fetchWeather(pos.coords.latitude, pos.coords.longitude);
		}, () => {
			$('location').textContent = '  Location denied';
		});

		// Unlock audio
		document.addEventListener('click', async () => {
			try {
				await azanAudio.play();
				azanAudio.pause();
				azanAudio.currentTime = 0;
			} catch {}
		}, {
			once: true
		});

		// Auto-refresh
		setInterval(() => {
			if (userCoords) fetchPrayerTimes(selectedDate);
		}, 300000);
		setInterval(() => {
			if (userCoords) fetchWeather(userCoords.latitude, userCoords.longitude);
		}, 600000);

		// Re-render prayers every minute for live now/done states
		setInterval(() => {
			if (todayPrayerTimes.length) renderPrayers();
		}, 30000);

		showWeek();

		// ─── QURAN PLAYER ───
		(function() {
			const surahs = ["Al-Fatiha", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus", "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha", "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum", "Luqman", "As-Sajda", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir", "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiya", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf", "Adh-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqia", "Al-Hadid", "Al-Mujadila", "Al-Hashr", "Al-Mumtahina", "As-Saff", "Al-Jumu'a", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij", "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa", "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiya", "Al-Fajr", "Al-Balad", "Ash-Shams", "Al-Lail", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyina", "Az-Zalzalah", "Al-Adiyat", "Al-Qari'a", "At-Takathur", "Al-Asr", "Al-Humaza", "Al-Fil", "Quraish", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr", "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"];
			const TOTAL = surahs.length;
			const qa = $('quran-audio');
			const play = $('play'),
				prev = $('prev'),
				next = $('next');
			const progress = $('progress'),
				volume = $('volume');
			let idx = Number(localStorage.getItem('surahIndex')) || 1;
			let playing = false,
				unlocked = false;
			qa.volume = 0.4;

			function load(i) {
				idx = i;
				const num = String(i).padStart(3, '0');
				$('surah-name').textContent = surahs[i - 1];
				$('p-status').textContent = 'Loading…';
				progress.value = 0;
				qa.src = `quran/${num}.mp3`;
				qa.load();
				localStorage.setItem('surahIndex', i);
			}

			function doPlay() {
				qa.play().then(() => {
						play.textContent = '⏸';
						playing = true;
						$('p-status').textContent = 'Playing';
					})
					.catch(() => {
						$('p-status').textContent = 'Tap to play';
					});
			}

			function doPause() {
				qa.pause();
				play.textContent = '▶';
				playing = false;
				$('p-status').textContent = 'Paused';
			}

			play.onclick = () => {
				unlocked = true;
				if (playing) doPause();
				else doPlay();
			};
			next.onclick = () => {
				load(idx % TOTAL + 1);
				if (unlocked && playing) setTimeout(doPlay, 500);
			};
			prev.onclick = () => {
				load(idx === 1 ? TOTAL : idx - 1);
				if (unlocked && playing) setTimeout(doPlay, 500);
			};
			volume.oninput = () => qa.volume = volume.value;
			qa.ontimeupdate = () => {
				if (qa.duration) progress.value = (qa.currentTime / qa.duration) * 100;
			};
			progress.oninput = () => {
				if (qa.duration) qa.currentTime = (progress.value / 100) * qa.duration;
			};
			qa.onloadedmetadata = () => $('p-status').textContent = 'Ready';
			qa.onended = () => next.click();
			qa.onerror = () => $('p-status').textContent = '❌ File not found';

			document.addEventListener('click', function unlock() {
				if (!unlocked) {
					qa.play().then(() => {
						qa.pause();
						unlocked = true;
					}).catch(() => {});
				}
			}, {
				once: true
			});

			load(idx);
		})();

		document.addEventListener('contextmenu', e => e.preventDefault());

	</script>
</body>
