<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
	<title>Prayer Times</title>
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: #f5f0e8;
			--bg2: #ede7d9;
			--cream: #faf7f2;
			--surface: #ffffff;
			--teal: #2a7c72;
			--teal-lt: #3d9e93;
			--teal-pale: #e4f4f2;
			--terra: #c4583a;
			--terra-pale: #faeae5;
			--gold: #b8860b;
			--gold-pale: #fdf3d8;
			--text: #1a1612;
			--text2: #5a5248;
			--text3: #9a9088;
			--border: rgba(26, 22, 18, 0.1);
			--shadow: 0 2px 20px rgba(26, 22, 18, 0.08);
			--shadow-md: 0 6px 30px rgba(26, 22, 18, 0.12);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			-webkit-tap-highlight-color: transparent;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: var(--bg);
			font-family: 'DM Sans', sans-serif;
			color: var(--text);
			user-select: none;
		}

		/* ══ Arabesque tile pattern background ══ */
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			z-index: 0;
			background-image:
				radial-gradient(circle at 20% 20%, rgba(42, 124, 114, 0.06) 0%, transparent 40%),
				radial-gradient(circle at 80% 80%, rgba(196, 88, 58, 0.05) 0%, transparent 40%),
				radial-gradient(circle at 50% 50%, rgba(184, 134, 11, 0.04) 0%, transparent 60%);
			pointer-events: none;
		}

		/* Geometric SVG tile pattern */
		body::after {
			content: '';
			position: fixed;
			inset: 0;
			z-index: 0;
			opacity: 0.035;
			background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%232a7c72' stroke-width='1'%3E%3Cpolygon points='30,2 58,16 58,44 30,58 2,44 2,16'/%3E%3Cpolygon points='30,12 48,21 48,39 30,48 12,39 12,21'/%3E%3Cline x1='30' y1='2' x2='30' y2='12'/%3E%3Cline x1='58' y1='16' x2='48' y2='21'/%3E%3Cline x1='58' y1='44' x2='48' y2='39'/%3E%3Cline x1='30' y1='58' x2='30' y2='48'/%3E%3Cline x1='2' y1='44' x2='12' y2='39'/%3E%3Cline x1='2' y1='16' x2='12' y2='21'/%3E%3C/g%3E%3C/svg%3E");
			background-size: 60px 60px;
			pointer-events: none;
		}

		/* ══ LAYOUT ══ */
		.app {
			position: relative;
			z-index: 1;
			display: grid;
			grid-template-columns: 310px 1fr;
			height: 100vh;
			gap: 0;
		}

		/* ══ LEFT SIDEBAR ══ */
		.sidebar {
			background: var(--teal);
			display: flex;
			flex-direction: column;
			padding: 24px 20px;
			gap: 0;
			position: relative;
			overflow: hidden;
		}

		/* Decorative arch top of sidebar */
		.sidebar::before {
			content: '';
			position: absolute;
			top: -1px;
			left: 50%;
			transform: translateX(-50%);
			width: 200px;
			height: 100px;
			background: rgba(255, 255, 255, 0.06);
			border-radius: 0 0 100px 100px;
			pointer-events: none;
		}

		/* Pattern overlay on sidebar */
		.sidebar::after {
			content: '';
			position: absolute;
			inset: 0;
			z-index: 0;
			opacity: 0.05;
			background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='white' stroke-width='0.8'%3E%3Cpolygon points='20,2 38,11 38,29 20,38 2,29 2,11'/%3E%3C/g%3E%3C/svg%3E");
			background-size: 40px 40px;
			pointer-events: none;
		}

		.sidebar>* {
			position: relative;
			z-index: 1;
		}

		/* Crescent + star logo */
		.brand {
			display: flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 22px;
		}

		.brand-icon {
			font-size: 28px;
			line-height: 1;
		}

		.brand-text {
			font-family: 'Playfair Display', serif;
			font-size: 18px;
			font-weight: 400;
			color: rgba(255, 255, 255, 0.9);
			letter-spacing: 0.5px;
		}

		/* Big clock */
		.sb-clock {
			text-align: center;
			padding: 10px 0 16px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.15);
			margin-bottom: 16px;
		}

		.sb-clock-time {
			font-family: 'Playfair Display', serif;
			font-size: 72px;
			font-weight: 400;
			color: #fff;
			line-height: 1;
			letter-spacing: -2px;
		}

		.sb-clock-ampm {
			font-size: 14px;
			font-weight: 300;
			color: white;
			letter-spacing: 4px;
			text-transform: uppercase;
			margin-top: 4px;
			position: relative;
			right: 32px;
			text-align: right;
		}

		.sb-clock-secs {
			font-size: 20px;
			font-weight: 200;
			color: yellow;
			letter-spacing: 2px;
			margin-top: 2px;
			position: relative;
			left: 10px;
		}

		/* Dates */
		.sb-dates {
			text-align: center;
			background-color: #448c83;
			padding: 10px;
			border-radius: 10px;
			margin-bottom: 16px;
		}

		.sb-greg {
			font-size: 20px;
			font-weight: 400;
			letter-spacing: 1.5px;
			text-transform: uppercase;
			color: black;
			margin-bottom: 3px;
		}

		.sb-hijri {
			font-family: 'Playfair Display', serif;
			font-size: 19px;
			font-style: normal;
			color: rgba(255, 255, 255, 0.85);
		}

		/* Current prayer card in sidebar */
		.sb-current {
			background: rgba(255, 255, 255, 0.12);
			border-radius: 16px;
			padding: 16px;
			border: 1px solid rgba(255, 255, 255, 0.18);
			margin-bottom: 14px;
			position: relative;
			overflow: hidden;
		}

		.sb-current::before {
			content: '';
			position: absolute;
			bottom: 0;
			right: 0;
			width: 80px;
			height: 80px;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 50%;
			transform: translate(20px, 20px);
		}

		.sb-cur-label {
			font-size: 10px;
			font-weight: 500;
			letter-spacing: 2.5px;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.5);
			margin-bottom: 6px;
		}

		.sb-cur-name {
			font-family: 'Playfair Display', serif;
			font-size: 36px;
			font-weight: 700;
			color: #fff;
			line-height: 1.1;
		}

		.sb-cur-time {
			font-size: 15px;
			font-weight: 300;
			color: rgba(255, 255, 255, 0.6);
			margin-top: 3px;
		}

		.sb-next {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-top: 12px;
			padding-top: 12px;
			border-top: 1px solid rgba(255, 255, 255, 0.12);
		}

		.sb-next-lbl {
			font-size: 10px;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.4);
		}

		.sb-next-val {
			font-family: 'Playfair Display', serif;
			font-size: 18px;
			color: #ffe08a;
			letter-spacing: 1px;
		}

		/* Location + weather */
		.sb-meta {
			display: flex;
			flex-direction: column;
			gap: 8px;
			margin-bottom: 16px;
		}

		.sb-chip {
			display: flex;
			align-items: center;
			gap: 8px;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 10px;
			padding: 9px 12px;
			font-size: 12px;
			font-weight: 300;
			color: rgba(255, 255, 255, 0.7);
		}

		.sb-chip-icon {
			font-size: 14px;
		}

		/* Bottom controls */
		.sb-controls {
			display: flex;
			gap: 8px;
			margin-top: auto;
		}

		.sb-btn {
			flex: 1;
			background: rgba(255, 255, 255, 0.1);
			border: 1px solid rgba(255, 255, 255, 0.15);
			border-radius: 12px;
			padding: 11px 8px;
			color: rgba(255, 255, 255, 0.7);
			font-size: 17px;
			cursor: pointer;
			transition: all 0.2s;
			text-align: center;
			font-family: inherit;
		}

		.sb-btn:hover {
			background: rgba(255, 255, 255, 0.18);
			color: #fff;
		}

		.sb-btn.muted {
			color: #ff9999;
		}

		/* ══ MAIN CONTENT ══ */
		.main {
			display: flex;
			flex-direction: column;
			padding: 20px 24px;
			gap: 16px;
			overflow: hidden;
		}

		/* Header row */
		.main-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.main-title {
			font-family: 'Playfair Display', serif;
			font-size: 26px;
			font-weight: 400;
			font-style: italic;
			color: var(--teal);
		}

		.tab-group {
			display: flex;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 3px;
			gap: 2px;
			box-shadow: var(--shadow);
		}

		.tab-btn {
			background: none;
			border: none;
			padding: 7px 18px;
			font-family: 'DM Sans', sans-serif;
			font-size: 12px;
			font-weight: 400;
			letter-spacing: 1px;
			text-transform: uppercase;
			color: var(--text3);
			border-radius: 9px;
			cursor: pointer;
			transition: all 0.2s;
		}

		.tab-btn.active {
			background: var(--teal);
			color: #fff;
			box-shadow: 0 2px 8px rgba(42, 124, 114, 0.3);
		}

		/* Calendar strip */
		.cal-wrap {
			background: var(--surface);
			border-radius: 16px;
			padding: 14px 16px;
			box-shadow: var(--shadow);
			border: 1px solid var(--border);
		}

		.calendar-strip {
			display: flex;
			gap: 6px;
			overflow-x: auto;
			scrollbar-width: none;
		}

		.calendar-strip::-webkit-scrollbar {
			display: none;
		}

		.cal-day {
			min-width: 54px;
			flex-shrink: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 4px;
			padding: 10px 6px;
			border-radius: 12px;
			border: 1.5px solid transparent;
			background: var(--bg);
			cursor: pointer;
			transition: all 0.2s;
		}

		.cal-day:hover {
			background: var(--teal-pale);
			border-color: rgba(42, 124, 114, 0.2);
		}

		.cal-day.active {
			background: var(--teal);
			border-color: var(--teal);
			box-shadow: 0 4px 12px rgba(42, 124, 114, 0.3);
		}

		.cal-wday {
			font-size: 9px;
			font-weight: 500;
			letter-spacing: 1.2px;
			text-transform: uppercase;
			color: var(--text3);
			transition: color 0.2s;
		}

		.cal-day.active .cal-wday {
			color: rgba(255, 255, 255, 0.7);
		}

		.cal-num {
			font-family: 'Playfair Display', serif;
			font-size: 22px;
			font-weight: 700;
			color: var(--text);
			line-height: 1;
			transition: color 0.2s;
		}

		.cal-day.active .cal-num {
			color: #fff;
		}

		/* ══ PRAYER GRID ══ */
		.prayer-grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 12px;
			flex: 1;
		}

		/*
		.prayer-card {
			background: var(--surface);
			border: 1.5px solid var(--border);
			border-radius: 18px;
			padding: 18px 16px;
			display: flex;
			flex-direction: column;
			gap: 5px;
			position: relative;
			overflow: hidden;
			cursor: default;
			box-shadow: var(--shadow);
			transition: transform 0.2s, box-shadow 0.2s;
		}
*/

		.prayer-card {
			background: var(--surface);
			border: 1.5px solid var(--border);
			border-radius: 18px;
			padding: 14px;
			display: flex;
			flex-direction: column;
			gap: 0px;
			position: relative;
			overflow: hidden;
			cursor: default;
			box-shadow: var(--shadow);
			transition: transform 0.2s, box-shadow 0.2s;
		}

		.prayer-card:hover {
			transform: translateY(-2px);
			box-shadow: var(--shadow-md);
		}

		/* Top colored stripe */
		.prayer-card::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 3px;
			background: var(--border);
			border-radius: 18px 18px 0 0;
			transition: background 0.3s;
		}

		.prayer-card.now {
			border-color: rgba(42, 124, 114, 0.35);
			background: var(--teal-pale);
		}

		.prayer-card.now::before {
			background: var(--teal);
		}

		.prayer-card.done {
			opacity: 0.5;
		}

		.prayer-card.done::before {
			background: var(--bg2);
		}

		/* Decorative circle */
		.prayer-card::after {
			content: '';
			position: absolute;
			bottom: -20px;
			right: -20px;
			width: 70px;
			height: 70px;
			border-radius: 50%;
			background: rgba(42, 124, 114, 0.04);
			pointer-events: none;
		}

		.prayer-card.done::after {
			background: rgba(90, 82, 72, 0.04);
		}

		.pc-name {
			font-size: 15px;
			font-weight: 500;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: green;
		}

		.prayer-card.now .pc-name {
			color: var(--teal);
		}

		.pc-time {
			font-family: 'Playfair Display', serif;
			font-size: 5.5vw;
			font-weight: 700;
			color: var(--text);
			line-height: 1.1;
		}

		.prayer-card.now .pc-time {
			color: var(--teal);
		}

		.pc-ampm {
			font-size: 20px;
			font-weight: 300;
			color: brown;
			letter-spacing: 1px;
		}

		.pc-pill {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			margin-top: 6px;
			font-size: 10px;
			font-weight: 500;
			letter-spacing: 1.5px;
			text-transform: uppercase;
			padding: 4px 10px;
			border-radius: 20px;
			width: fit-content;
		}

		.now-pill {
			background: var(--teal);
			color: #fff;
			box-shadow: 0 2px 8px rgba(42, 124, 114, 0.3);
			position: absolute;
			float: right;
			right: 10px;
			top: 5px;
		}

		.now-pill::before {
			content: '●';
			font-size: 7px;
			animation: blink 1.4s infinite;
			margin-right: 2px;
		}

		@keyframes blink {

			0%,
			100% {
				opacity: 1
			}

			50% {
				opacity: 0.2
			}
		}

		.done-pill {
			background: var(--bg2);
			color: var(--text3);
			position: absolute;
			float: right;
			right: 10px;
			top: 5px;
		}

		/* ══ QURAN PLAYER ══ */
		.player-wrap {
			background: var(--surface);
			border: 1.5px solid var(--border);
			border-radius: 18px;
			padding: 14px 18px;
			display: flex;
			align-items: center;
			gap: 16px;
			box-shadow: var(--shadow);
		}

		.player-accent {
			width: 46px;
			height: 46px;
			flex-shrink: 0;
			background: linear-gradient(135deg, var(--teal), var(--teal-lt));
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 22px;
			box-shadow: 0 4px 12px rgba(42, 124, 114, 0.3);
		}

		.player-info {
			flex: 1;
			min-width: 0;
		}

		.player-surah {
			font-family: 'Playfair Display', serif;
			font-size: 17px;
			font-weight: 700;
			color: var(--text);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.player-sub {
			font-size: 11px;
			font-weight: 300;
			color: var(--text3);
			letter-spacing: 0.5px;
			margin-top: 2px;
		}

		.player-btns {
			display: flex;
			gap: 6px;
			align-items: center;
		}

		.p-btn {
			width: 36px;
			height: 36px;
			border-radius: 10px;
			border: 1.5px solid var(--border);
			background: var(--bg);
			color: var(--text2);
			font-size: 13px;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: inherit;
		}

		.p-btn:hover {
			background: var(--teal-pale);
			border-color: rgba(42, 124, 114, 0.3);
			color: var(--teal);
		}

		.p-btn.play-main {
			width: 44px;
			height: 44px;
			font-size: 15px;
			background: var(--teal);
			border-color: transparent;
			color: #fff;
			box-shadow: 0 4px 12px rgba(42, 124, 114, 0.35);
		}

		.p-btn.play-main:hover {
			background: var(--teal-lt);
		}

		.player-sliders {
			display: flex;
			align-items: center;
			gap: 8px;
			min-width: 200px;
		}

		input[type="range"] {
			-webkit-appearance: none;
			appearance: none;
			height: 4px;
			border-radius: 4px;
			background: var(--bg2);
			cursor: pointer;
			flex: 1;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 14px;
			height: 14px;
			border-radius: 50%;
			background: var(--teal);
			cursor: pointer;
			box-shadow: 0 0 6px rgba(42, 124, 114, 0.4);
		}

		#vol-range {
			width: 60px;
			flex: 0 0 60px;
		}

		.slider-icon {
			font-size: 13px;
			color: var(--text3);
		}

		/* ══ TABBED MEDIA PLAYER ══ */
		.media-player-shell {
			background: var(--surface);
			border: 1.5px solid var(--border);
			border-radius: 18px;
			overflow: hidden;
			box-shadow: var(--shadow);
		}

		.media-tabs {
			display: flex;
			border-bottom: 1.5px solid var(--border);
			background: var(--bg);
		}

		.media-tab {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 7px;
			padding: 11px 10px;
			font-family: 'DM Sans', sans-serif;
			font-size: 13px;
			font-weight: 500;
			letter-spacing: 0.5px;
			color: var(--text3);
			background: none;
			border: none;
			cursor: pointer;
			transition: all 0.22s;
			position: relative;
		}

		.media-tab::after {
			content: '';
			position: absolute;
			bottom: -1.5px;
			left: 0;
			right: 0;
			height: 2.5px;
			background: transparent;
			border-radius: 2px 2px 0 0;
			transition: background 0.22s;
		}

		.media-tab.active {
			color: var(--text);
			background: var(--surface);
		}

		.media-tab.active::after {
			background: var(--teal);
		}

		.media-tab#mtab-nashed.active::after {
			background: var(--terra);
		}

		.media-tab:hover:not(.active) {
			background: var(--teal-pale);
			color: var(--text2);
		}

		.media-tab#mtab-nashed:hover:not(.active) {
			background: var(--terra-pale);
		}

		.mtab-icon {
			font-size: 15px;
		}

		.media-panel {
			display: block;
		}

		.media-panel.hidden {
			display: none;
		}

		.media-panel .player-wrap {
			box-shadow: none;
			border: none;
			border-radius: 0;
			background: var(--surface);
		}

		/* nashed accent — terra/gold theme */
		.nashed-accent {
			background: linear-gradient(135deg, var(--terra), #e07050) !important;
			box-shadow: 0 4px 12px rgba(196, 88, 58, 0.3) !important;
		}

		.nashed-play {
			background: var(--terra) !important;
			box-shadow: 0 4px 12px rgba(196, 88, 58, 0.35) !important;
		}

		.nashed-play:hover {
			background: #d96545 !important;
		}

		.nashed-player input[type="range"]::-webkit-slider-thumb {
			background: var(--terra) !important;
		}

		.vol-slider {
			width: 60px !important;
			flex: 0 0 60px !important;
		}

		audio {
			display: none;
		}

		/* ══ ENTRY ANIMATIONS ══ */
		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(12px);
			}

			to {
				opacity: 1;
				transform: none;
			}
		}

		.prayer-card {
			animation: fadeUp 0.4s ease both;
		}

		.prayer-card:nth-child(1) {
			animation-delay: .05s
		}

		.prayer-card:nth-child(2) {
			animation-delay: .10s
		}

		.prayer-card:nth-child(3) {
			animation-delay: .15s
		}

		.prayer-card:nth-child(4) {
			animation-delay: .20s
		}

		.prayer-card:nth-child(5) {
			animation-delay: .25s
		}

		.prayer-card:nth-child(6) {
			animation-delay: .30s
		}

		.prayer-card:nth-child(7) {
			animation-delay: .35s
		}

		.prayer-card:nth-child(8) {
			animation-delay: .40s
		}

	</style>
</head>

<body>
	<div class="app">

		<!-- ══ SIDEBAR ══ -->
		<div class="sidebar">
			<div class="brand">
				<span class="brand-icon">☽</span>
				<span class="brand-text">Local Prayer Times</span>
			</div>

			<div class="sb-clock">
				<div class="sb-clock-time"><span id="cl-h">--</span>:<span id="cl-m">--</span> :<span id="cl-s" class="sb-clock-secs">00</span></div>
				<div class="sb-clock-ampm" id="cl-ap">AM</div>
			</div>

			<div class="sb-dates">
				<div class="sb-greg" id="greg-date">—</div>
				<div class="sb-hijri" id="hijri-date">—</div>
			</div>

			<div class="sb-current">
				<div class="sb-cur-label">Current Prayer</div>
				<div class="sb-cur-name" id="cur-name">—</div>
				<div class="sb-cur-time" id="cur-time">—</div>
				<div class="sb-next">
					<span class="sb-next-lbl">Next</span>
					<span class="sb-next-val" id="next-cd">—</span>
				</div>
			</div>

			<div class="sb-meta">
				<div class="sb-chip">
					<span class="sb-chip-icon">📍</span>
					<span id="location">Locating…</span>
				</div>
				<div class="sb-chip">
					<span class="sb-chip-icon">🌡</span>
					<span id="weather-text">—</span>
				</div>
			</div>

			<div class="sb-controls">
				<button class="sb-btn" id="mute-btn">🔊</button>
				<button class="sb-btn" id="refresh-btn">⟳</button>
				<button class="sb-btn" id="fs-btn">⛶</button>
			</div>
		</div>

		<!-- ══ MAIN ══ -->
		<div class="main">
			<div class="main-header">
				<div class="main-title">Today's Schedule</div>
				<div class="tab-group">
					<button class="tab-btn active" id="tab-week" onclick="showWeek()">Bi-Weekly</button>
					<button class="tab-btn" id="tab-month" onclick="showMonth()">Month</button>

			<!-- ══ TABBED MEDIA PLAYER ══ -->
			<div class="media-player-shell">

				<!-- Tab switcher -->
				<div class="media-tabs">
					<button class="media-tab active" id="mtab-quran" onclick="switchMediaTab('quran')">
						<span class="mtab-icon">📖</span> Holy Quran
					</button>
					<button class="media-tab" id="mtab-nashed" onclick="switchMediaTab('nashed')">
						<span class="mtab-icon">🎵</span> nashed
					</button>
				</div>

				<!-- Quran Panel -->
				<div class="media-panel" id="panel-quran">
					<div class="player-wrap">
						<div class="player-accent quran-accent">📖</div>
						<div class="player-info">
							<div class="player-surah">Surah <span id="surah-name">Al-Fatiha</span></div>
							<div class="player-sub">Mishari Al-Afasi · <span id="p-status">Ready</span></div>
						</div>
						<div class="player-btns">
							<button class="p-btn" id="q-prev">⏮</button>
							<button class="p-btn play-main quran-play" id="q-play">▶</button>
							<button class="p-btn" id="q-next">⏭</button>
						</div>
						<div class="player-sliders">
							<span class="slider-icon">⏳</span>
							<input type="range" id="q-progress" min="0" max="100" value="0" step="0.1">
							<span class="slider-icon">🔊</span>
							<input type="range" class="vol-slider" id="q-vol" min="0" max="1" step="0.01" value="0.4">
						</div>
					</div>
				</div>

				<!-- nashed Panel -->
				<div class="media-panel hidden" id="panel-nashed">
					<div class="player-wrap nashed-player">
						<div class="player-accent nashed-accent">🎵</div>
						<div class="player-info">
							<div class="player-surah"><span id="nashed-name">—</span></div>
							<div class="player-sub">nashed · <span id="n-status">Ready</span></div>
						</div>
						<div class="player-btns">
							<button class="p-btn" id="n-prev">⏮</button>
							<button class="p-btn play-main nashed-play" id="n-play">▶</button>
							<button class="p-btn" id="n-next">⏭</button>
						</div>
						<div class="player-sliders">
							<span class="slider-icon">⏳</span>
							<input type="range" id="n-progress" min="0" max="100" value="0" step="0.1">
							<span class="slider-icon">🔊</span>
							<input type="range" class="vol-slider" id="n-vol" min="0" max="1" step="0.01" value="0.4">

	</div>

	<audio id="azan-audio" src="azan.mp3" preload="auto"></audio>
	<audio id="quran-audio" preload="metadata"></audio>
	<audio id="nashed-audio" preload="metadata"></audio>

	<script>
		// ─── CORE ───
		let userCoords = null,
			todayPrayers = [],
			azanPlayed = null;
		let isMuted = false,
			selDate = new Date();
		const azanAudio = document.getElementById('azan-audio');
		const $ = id => document.getElementById(id);

		// ─── CLOCK ───
		function tick() {
			const n = new Date();
			let h = n.getHours(),
				m = n.getMinutes(),
				s = n.getSeconds();
			const ap = h >= 12 ? 'PM' : 'AM';
			h = h % 12 || 12;
			$('cl-h').textContent = String(h).padStart(2, '0');
			$('cl-m').textContent = String(m).padStart(2, '0');
			$('cl-s').textContent = String(s).padStart(2, '0');
			$('cl-ap').textContent = ap;
		}
		setInterval(tick, 1000);
		tick();

		// ─── UTILS ───
		function fmt12(ts) {
			const [h, m] = ts.split(':').map(Number);
			const ap = h >= 12 ? 'PM' : 'AM';
			return {
				time: `${(h%12||12)}:${String(m).padStart(2,'0')}`,
				ampm: ap
			};
		}

		function toDate(ts, ref) {
			const [h, m, s = 0] = ts.split(':').map(Number);
			const t = new Date(ref);
			t.setHours(h, m, s, 0);
			return t;
		}

		// ─── WEATHER ───
		async function fetchWeather(lat, lon) {
			try {
				const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m,weathercode&temperature_unit=fahrenheit`);
				const d = await r.json();
				const icons = {
					0: '☀️',
					1: '🌤',
					2: '⛅',
					3: '☁️',
					45: '🌫',
					51: '🌦',
					61: '🌧',
					71: '🌨',
					80: '🌦',
					95: '⛈'
				};
				const icon = icons[d.current.weathercode] || '🌡';
				$('weather-text').textContent = `${icon} ${d.current.temperature_2m}°F  ·  💨 ${d.current.wind_speed_10m} km/h`;
			} catch {
				$('weather-text').textContent = 'Unavailable';
			}
		}

		// ─── PRAYERS ───
		async function fetchPrayers(date) {
			if (!userCoords || !navigator.onLine) return;
			selDate = date;
			todayPrayers = [];
			azanPlayed = null;
			const {
				latitude: lat,
				longitude: lon
			} = userCoords;
			const d = date.getDate(),
				mo = date.getMonth() + 1,
				yr = date.getFullYear();
			try {
				const res = await fetch(`https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=2&month=${mo}&year=${yr}&school=1`);
				const json = await res.json();
				if (json.code !== 200) throw new Error();
				const day = json.data[d - 1];
				const T = day.timings,
					H = day.date.hijri;

				$('greg-date').textContent = date.toLocaleDateString('en-US', {
					weekday: 'short',
					month: 'short',
					day: '2-digit',
					year: 'numeric'
				}).toUpperCase();
				$('hijri-date').textContent = `${H.day} ${H.month.en} ${H.year}`;

				const order = [{
						name: 'Imsak',
						key: 'Imsak'
					}, {
						name: 'Fajr',
						key: 'Fajr'
					}, {
						name: 'Sunrise',
						key: 'Sunrise'
					},
					{
						name: 'Ishraq',
						key: 'Ishraq',
						derived: true,
						after: 22
					},
					{
						name: 'Zuhr',
						key: 'Dhuhr'
					}, {
						name: 'Asr',
						key: 'Asr'
					}, {
						name: 'Maghrib',
						key: 'Maghrib'
					}, {
						name: "Isha'a",
						key: 'Isha'
					}
				];
				for (const p of order) {
					let ts;
					if (p.derived) {
						const [sh, sm] = T['Sunrise'].split(' ')[0].split(':').map(Number);
						const tot = sh * 60 + sm + p.after;
						ts = `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}:00`;
					} else {
						if (!T[p.key]) continue;
						ts = T[p.key].split(' ')[0];
						if (ts.length === 5) ts += ':00';
					}
					todayPrayers.push({
						key: p.key,
						name: p.name,
						time: toDate(ts, date),
						ts
					});
				}
				renderGrid();
				startCountdown();
			} catch (e) {
				console.error(e);
			}
		}

		function renderGrid() {
			const now = new Date(),
				grid = $('prayer-grid');
			grid.innerHTML = '';
			let cur = null;
			for (let i = 0; i < todayPrayers.length; i++) {
				const p = todayPrayers[i],
					nx = todayPrayers[i + 1];
				const isNow = now >= p.time && (!nx || now < nx.time);
				const isDone = !isNow && now >= p.time;
				if (isNow) cur = p;
				const {
					time,
					ampm
				} = fmt12(p.ts);
				const card = document.createElement('div');
				card.className = `prayer-card${isNow?' now':isDone?' done':''}`;
				card.innerHTML = `
      <div class="pc-name">${p.name}</div>
      <div class="pc-time">${time} <span class="pc-ampm">${ampm}</span></div>
      ${isNow?`<span class="pc-pill now-pill">now</span>`:isDone?`<span class="pc-pill done-pill">✓ done</span>`:''}
    `;
				grid.appendChild(card);
			}
			if (cur) {
				$('cur-name').textContent = cur.name;
				const {
					time,
					ampm
				} = fmt12(cur.ts);
				$('cur-time').textContent = `${time} ${ampm}`;
			} else {
				$('cur-name').textContent = '—';
				$('cur-time').textContent = '—';
			}
		}

		let cdTimer = null;

		function startCountdown() {
			if (cdTimer) clearInterval(cdTimer);
			cdTimer = setInterval(() => {
				const now = new Date(),
					nx = todayPrayers.find(p => p.time > now);
				if (nx) {
					const d = nx.time - now;
					const h = Math.floor(d / 3600000),
						m = Math.floor((d % 3600000) / 60000),
						s = Math.floor((d % 60000) / 1000);
					$('next-cd').textContent = `${nx.name} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
				} else $('next-cd').textContent = 'All done ✦';
			}, 1000);
		}

		// ─── AZAN ───
		setInterval(() => {
			if (!todayPrayers.length || isMuted) return;
			const now = new Date();
			for (const p of todayPrayers) {
				const diff = now - p.time;
				if (diff >= 0 && diff < 19000 && azanPlayed !== p.key) {
					azanAudio.currentTime = 0;
					azanAudio.play().catch(() => {});
					azanPlayed = p.key;
				}
			}
		}, 1000);

		// ─── CALENDAR ───
		function showWeek() {
			$('tab-week').classList.add('active');
			$('tab-month').classList.remove('active');
			const cal = $('calendar');
			cal.innerHTML = '';
			const now = new Date(),
				start = new Date(now);
			start.setDate(now.getDate() - now.getDay());
			for (let i = 0; i < 14; i++) {
				const date = new Date(start);
				date.setDate(start.getDate() + i);
				const isToday = date.toDateString() === new Date().toDateString();
				const el = document.createElement('div');
				el.className = `cal-day${isToday?' active':''}`;
				el.innerHTML = `<span class="cal-wday">${date.toLocaleDateString('en-US',{weekday:'short'})}</span><span class="cal-num">${date.getDate()}</span>`;
				el.addEventListener('click', () => {
					document.querySelectorAll('.cal-day').forEach(e => e.classList.remove('active'));
					el.classList.add('active');
					fetchPrayers(date);
				});
				cal.appendChild(el);
			}
		}

		function showMonth() {
			$('tab-week').classList.remove('active');
			$('tab-month').classList.add('active');
			const cal = $('calendar');
			cal.innerHTML = '';
			const now = new Date(),
				yr = now.getFullYear(),
				mo = now.getMonth();
			const days = new Date(yr, mo + 1, 0).getDate(),
				first = new Date(yr, mo, 1).getDay();
			for (let i = 0; i < first; i++) {
				const e = document.createElement('div');
				e.className = 'cal-day';
				e.style.visibility = 'hidden';
				cal.appendChild(e);
			}
			for (let d = 1; d <= days; d++) {
				const date = new Date(yr, mo, d);
				const el = document.createElement('div');
				el.className = `cal-day${d===now.getDate()?' active':''}`;
				el.innerHTML = `<span class="cal-wday">${date.toLocaleDateString('en-US',{weekday:'short'})}</span><span class="cal-num">${d}</span>`;
				el.addEventListener('click', () => {
					document.querySelectorAll('.cal-day').forEach(e => e.classList.remove('active'));
					el.classList.add('active');
					fetchPrayers(date);
				});
				cal.appendChild(el);
			}
		}

		// ─── CONTROLS ───
		$('mute-btn').addEventListener('click', async () => {
			isMuted = !isMuted;
			azanAudio.muted = isMuted;
			$('mute-btn').textContent = isMuted ? '🔇' : '🔊';
			$('mute-btn').classList.toggle('muted', isMuted);
			if (!isMuted) {
				try {
					await azanAudio.play();
					azanAudio.pause();
					azanAudio.currentTime = 0;
				} catch {}
			}
		});
		$('refresh-btn').addEventListener('click', () => {
			if (userCoords) {
				fetchPrayers(selDate);
				fetchWeather(userCoords.latitude, userCoords.longitude);
			}
		});
		$('fs-btn').addEventListener('click', () => {
			if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
			else document.exitFullscreen();
		});
		document.addEventListener('fullscreenchange', () => {
			$('fs-btn').textContent = document.fullscreenElement ? '⤢' : '⛶';
		});

		// ─── GEO ───
		navigator.geolocation.getCurrentPosition(async pos => {
			userCoords = pos.coords;
			try {
				const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
				const j = await r.json();
				$('location').textContent = j.address && (j.address.city || j.address.town || j.address.village || j.address.state) || 'Your Location';
			} catch {
				$('location').textContent = 'Location';
			}
			fetchPrayers(new Date());
			fetchWeather(pos.coords.latitude, pos.coords.longitude);
		}, () => {
			$('location').textContent = 'Location denied';
		});

		document.addEventListener('click', async () => {
			try {
				await azanAudio.play();
				azanAudio.pause();
				azanAudio.currentTime = 0;
			} catch {}
		}, {
			once: true
		});
		setInterval(() => {
			if (userCoords) fetchPrayers(selDate);
		}, 300000);
		setInterval(() => {
			if (userCoords) fetchWeather(userCoords.latitude, userCoords.longitude);
		}, 600000);
		setInterval(() => {
			if (todayPrayers.length) renderGrid();
		}, 30000);

		showWeek();

		// ─── MEDIA TAB SWITCHER ───
		function switchMediaTab(tab) {
			$('mtab-quran').classList.toggle('active', tab === 'quran');
			$('mtab-nashed').classList.toggle('active', tab === 'nashed');
			$('panel-quran').classList.toggle('hidden', tab !== 'quran');
			$('panel-nashed').classList.toggle('hidden', tab !== 'nashed');
		}

		// ─── QURAN PLAYER ───
		(function() {
			const surahs = ["Al-Fatiha", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf", "Al-Anfal", "At-Tawbah", "Yunus", "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf", "Maryam", "Ta-Ha", "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml", "Al-Qasas", "Al-Ankabut", "Ar-Rum", "Luqman", "As-Sajda", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad", "Az-Zumar", "Ghafir", "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiya", "Al-Ahqaf", "Muhammad", "Al-Fath", "Al-Hujurat", "Qaf", "Adh-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqia", "Al-Hadid", "Al-Mujadila", "Al-Hashr", "Al-Mumtahina", "As-Saff", "Al-Jumu'a", "Al-Munafiqun", "At-Taghabun", "At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij", "Nuh", "Al-Jinn", "Al-Muzzammil", "Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa", "At-Takwir", "Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiya", "Al-Fajr", "Al-Balad", "Ash-Shams", "Al-Lail", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyina", "Az-Zalzalah", "Al-Adiyat", "Al-Qari'a", "At-Takathur", "Al-Asr", "Al-Humaza", "Al-Fil", "Quraish", "Al-Ma'un", "Al-Kawthar", "Al-Kafirun", "An-Nasr", "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"];
			const TOTAL = surahs.length;
			const qa = $('quran-audio');
			let idx = Number(localStorage.getItem('surahIndex')) || 1,
				playing = false,
				unlocked = false;
			qa.volume = 0.4;
			$('q-vol').value = 0.4;

			function load(i) {
				idx = i;
				$('surah-name').textContent = surahs[i - 1];
				$('p-status').textContent = 'Loading…';
				$('q-progress').value = 0;
				qa.src = `quran/${String(i).padStart(3,'0')}.mp3`;
				qa.load();
				localStorage.setItem('surahIndex', i);
			}
			const doPlay = () => qa.play().then(() => {
				$('q-play').textContent = '⏸';
				playing = true;
				$('p-status').textContent = 'Playing';
			}).catch(() => $('p-status').textContent = 'Tap ▶');
			const doPause = () => {
				qa.pause();
				$('q-play').textContent = '▶';
				playing = false;
				$('p-status').textContent = 'Paused';
			};

			$('q-play').onclick = () => {
				unlocked = true;
				if (playing) doPause();
				else doPlay();
			};
			$('q-next').onclick = () => {
				load(idx % TOTAL + 1);
				if (unlocked && playing) setTimeout(doPlay, 500);
			};
			$('q-prev').onclick = () => {
				load(idx === 1 ? TOTAL : idx - 1);
				if (unlocked && playing) setTimeout(doPlay, 500);
			};
			$('q-vol').oninput = () => qa.volume = $('q-vol').value;
			qa.ontimeupdate = () => {
				if (qa.duration) $('q-progress').value = (qa.currentTime / qa.duration) * 100;
			};
			$('q-progress').oninput = () => {
				if (qa.duration) qa.currentTime = ($('q-progress').value / 100) * qa.duration;
			};
			qa.onloadedmetadata = () => $('p-status').textContent = 'Ready';
			qa.onended = () => $('q-next').click();
			qa.onerror = () => $('p-status').textContent = '❌ Not found';
			load(idx);
		})();

		// ─── nashed PLAYER ───
		(function() {
			const na = $('nashed-audio');
			let tracks = []; // [{ file: "nashed/foo.mp3", title: "foo" }]
			let idx = 0; // 0-based index into tracks[]
			let playing = false,
				unlocked = false;
			na.volume = 0.4;
			$('n-vol').value = 0.4;

			// ── Pretty-print filename → title ──
			function prettyTitle(filename) {
				return filename
					.replace(/\.[^/.]+$/, '') // strip extension
					.replace(/^\d+[\s._\-]+/, '') // strip leading track numbers
					.replace(/[_\-]+/g, ' ') // underscores/hyphens → spaces
					.replace(/\b\w/g, c => c.toUpperCase()) // Title Case
					.trim() || filename;
			}

			// ── Render track info ──
			function showTrack() {
				const t = tracks[idx];
				if (!t) {
					$('nashed-name').textContent = 'No tracks found';
					$('n-status').textContent = '—';
					return;
				}
				$('nashed-name').textContent = t.title;
				$('n-status').textContent = `${idx+1} / ${tracks.length}`;
			}

			// ── Load & optionally play ──
			function load(i, autoplay) {
				if (!tracks.length) return;
				idx = ((i % tracks.length) + tracks.length) % tracks.length;
				showTrack();
				$('n-progress').value = 0;
				na.src = tracks[idx].file;
				na.load();
				localStorage.setItem('nashedIndex', idx);
				if (autoplay) setTimeout(doPlay, 400);
			}

			const doPlay = () => na.play().then(() => {
				$('n-play').textContent = '⏸';
				playing = true;
				$('n-status').textContent = `${idx+1} / ${tracks.length}`;
			}).catch(() => $('n-status').textContent = 'Tap ▶');
			const doPause = () => {
				na.pause();
				$('n-play').textContent = '▶';
				playing = false;
				$('n-status').textContent = 'Paused';
			};

			$('n-play').onclick = () => {
				unlocked = true;
				if (playing) doPause();
				else doPlay();
			};
			$('n-next').onclick = () => load(idx + 1, unlocked && playing);
			$('n-prev').onclick = () => load(idx - 1, unlocked && playing);
			$('n-vol').oninput = () => na.volume = $('n-vol').value;
			na.ontimeupdate = () => {
				if (na.duration) $('n-progress').value = (na.currentTime / na.duration) * 100;
			};
			$('n-progress').oninput = () => {
				if (na.duration) na.currentTime = ($('n-progress').value / 100) * na.duration;
			};
			na.onloadedmetadata = () => {
				/* title already set */
			};
			na.onended = () => $('n-next').click();
			na.onerror = () => {
				$('n-status').textContent = '❌ Not found';
				if (unlocked && playing) setTimeout(() => load(idx + 1, true), 800);
			};

			// ── Boot: load manifest.json from nashed folder ──
			// nashed/manifest.json should be a JSON array of filenames, e.g.:
			//   ["01 - Tala Al Badru.mp3", "02 - Ya Taiba.mp3", ...]
			// If the file doesn't exist, we fall back to trying 001–200 sequentially.
			async function init() {
				$('nashed-name').textContent = 'Loading…';
				$('n-status').textContent = '…';

				// Try manifest.json first
				try {
					const res = await fetch('nashed/manifest.json');
					if (res.ok) {
						const files = await res.json();
						if (Array.isArray(files) && files.length) {
							tracks = files.map(f => ({
								file: `nashed/${f}`,
								title: prettyTitle(f)
							}));
							const saved = Number(localStorage.getItem('nashedIndex')) || 0;
							load(saved < tracks.length ? saved : 0, false);
							return;
						}
					}
				} catch (e) {
					/* no manifest, try probe */
				}

				// Fallback: probe nashed/001.mp3 … 200.mp3 via HEAD requests (silent)
				$('n-status').textContent = 'Scanning…';
				const found = [];
				const probes = [];
				for (let i = 1; i <= 200; i++) {
					const file = `nashed/${String(i).padStart(3,'0')}.mp3`;
					probes.push(
						fetch(file, {
							method: 'HEAD'
						})
						.then(r => r.ok ? found.push({
							n: i,
							file,
							title: `Track ${String(i).padStart(2,'0')}`
						}) : null)
						.catch(() => null)
					);
				}
				await Promise.all(probes);
				found.sort((a, b) => a.n - b.n);
				tracks = found;

				if (tracks.length) {
					const saved = Number(localStorage.getItem('nashedIndex')) || 0;
					load(saved < tracks.length ? saved : 0, false);
				} else {
					$('nashed-name').textContent = 'No files found';
					$('n-status').textContent = 'Add nashed/manifest.json';
				}
			}

			init();
		})();

		document.addEventListener('contextmenu', e => e.preventDefault());

	</script>
</body>
