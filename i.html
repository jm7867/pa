<!DOCTYPE html>

	<title>Prayer Times App</title>
	<style>
		body {
			margin: 0;
			font-family: 'Segoe UI', sans-serif;
			background: none;
			padding: 15px;
			font-size: 18px;
			color: white;
			position: relative;
			overflow-x: hidden;
			overflow-y: hidden;
			height: 100vh;
		}

		body::before {
			content: "";
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-image: url('background.jpg');
			background-size: cover;
			background-position: center;
			filter: blur(18px) brightness(0.7);
			/* blur + darken */
			z-index: -1;
		}

		.container {
			width: 100%;
			margin: 0;
		}

		.date-box {
			display: flex;
			flex-direction: column;
			/* stack vertically */
			justify-content: center;
			align-items: center;
			gap: 6px;
			padding: 10px;
			border-radius: 16px;

		#gregorian-date {
			font-size: 30px;
			font-weight: 600;

		}

		#hijri-date {
			font-size: 30px;

			/* soft bluish contrast */

			font-size: 13px;

		.location {
			display: flex;

			/*			font-size: 16px;*/

			margin: 0;
		}

		.card {
			background: linear-gradient(145deg, #222, #333);
			padding: 20px;
			border-radius: 16px;
			margin-top: 10px;
			display: flex;
			justify-content: center;
			/*			gap: 20px;
			/*			font-variant: small-caps;*/
			flex-wrap: wrap;
		}

		.card-section {
			flex: -1 1 30%;
		}

		.card h2 {

		}

		#digital-clock {
			font-size: 70px;
			font-weight: bold;
			color: white;
			line-height: 1.2;
			text-align: right;
			/*			text-shadow: 0 0 0px white, 0 0 10px black, 0 0 10px #00ff99;*/
		}

		.prayer-list {
			display: flex;
			flex-wrap: wrap;
			gap: 12px;
			margin-top: 20px;
		}

		.prayer-item {
			background: #0e463a;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 16px;
			border-radius: 12px;
			width: calc(50% - 6px);
			box-sizing: border-box;
			font-size: 22px;
			font-variant: small-caps;
		}

		.now-tag {
			background: #ffaa00;
			color: black;
			padding: 2px 8px;
			border-radius: 8px;
			font-size: 12px;
			margin-left: 0px;
		}

		.finished-tag {
			color: black;
			background: gray;
			padding: 2px 8px;
			border-radius: 8px;
			font-size: 12px;
			margin-left: 0px;
		}

		.progress-section {
			margin-top: 20px;
		}

		.tabs {
			display: flex;
			justify-content: center;
			gap: 50px;
			margin-bottom: 10px;
		}

		.tabs button {
			background: #083e34;
			color: white;
			border: none;
			padding: 10px 20px;

			font-variant: small-caps;
		}

		.tabs .active {
			background: white;
			color: #083e34;
			font-weight: bold;
		}

		.calendar {
			display: flex;
			flex-wrap: wrap;
			justify-content: flex-start;
			padding: 5px;
		}

		.calendar-day {
			width: 45px;
			text-align: center;
			font-size: 20px;
			position: relative;
			left: 10%;
			top: 30px;
			/* optional: vertical center */

			/* offset half width & height */
			margin: 4px;
			cursor: pointer;
			padding: 4px;
			border-radius: 10px;
		}

		.meta-row {
			display: flex;
			gap: 12px;
			align-items: center;
			margin-top: 8px;
			justify-content: flex-end;
			border-radius: 10px;
			/* Push items to the right */

		.secondary {
			position: absolute;
			font-size: 28px;
			font-weight: bold;
			margin-top: -10px;
			margin-left: 5px;
			color: white;
			cursor: pointer;

		#current-prayer {
			font-size: 42px;
			font-weight: bold;
			color: goldenrod;
			line-height: 1.2;
			text-align: left;
		}

		.calendar-day.active {

			font-weight: bold;
		}

		#next-prayer-countdown {
			text-decoration: overline;

		div {
			font-size: ;

			/*
			display: flex;
			gap: 8px;
*/
			align-items: center;
			font-size: 13px;
			background-color: black;
			padding: 10px;
			margin-left: 10px;

			font-weight: bold;

		#weather-icon {
			width: 36px;
			height: 36px;

		.test_2 {

		}

		.wrapper {
			/*
			width: 90%;
			display: flex;
			align-items: center;
			justify-content: center;
			  min-height: 100vh;
			background-size: cover;
			display: flex;
			flex-wrap: wrap;
			justify-content: flex-start;
			margin: 10px;
			position: relative;
			left: 20px;
*/
			margin: 0px 22px 0px 22px;
			position: relative;

		}

		.player {
			background: rgba(31, 31, 31, 0.95);
			backdrop-filter: blur(20px);
			padding: 10px;
			border-radius: 24px;
			/*			max-width: 360px;*/

			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
			border: 1px solid rgba(255, 107, 107, 0.1);

		.player .surah-title {

		}

		.player .surah-subtitle {

		.player .controls {
			display: flex;

			gap: 16px;
			/*			margin-bottom: 24px;*/
		}

		.player button {
			width: 41px;
			height: 41px;
			border: none;
			border-radius: 30%;
			background: linear-gradient(145deg, #ff6b6b, #ff8e8e);

			font-size: 20px;

		.player button:hover {

		.player .play-btn {
			/*
			width: 72px;
			height: 72px;
*/

			background: linear-gradient(145deg, #4ecdc4, #44a08d);

		.slider-row {
			display: flex;
			align-items: center;
			gap: 12px;

		input[type="range"] {
			/*
			flex: 1;
			height: 8px;
*/
			border-radius: 8px;
			background: #444;
			cursor: pointer;
			-webkit-appearance: none;
			width: 50%;

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 20px;
			height: 20px;
			background: #ff6b6b;
			border-radius: 50%;
			cursor: pointer;
		}

		.status {
			/*			font-size: 12px;*/
			color: #aaa;
			/*
			margin-top: 12px;
			font-family: monospace;
*/
		}

		@media (max-width: 780px) {

			#digital-clock {

				text-shadow: 2px 1px 5px black;
				text-align: center;

			}

	</style>
</head>

<body>

	<!-- audio element: update src to your azan file name -->
	<audio id="azan-audio" src="azan.mp3" preload="auto"></audio>
	<script>
		/* Globals */
		let userCoords = null;
		let todayPrayerTimes = []; // { key, name, time (Date), timeStr24 }
		let azanPlayedFor = null; // key of prayer already played
		let isMuted = false;
		let selectedDateGlobal = new Date();
		const audio = document.getElementById('azan-audio');
		audio.muted = isMuted;
		// Unlock audio on first user click
		document.addEventListener('click', async () => {
			try {
				await audio.play();
				audio.pause();
				audio.currentTime = 0;
			} catch (e) {
				console.warn('Audio unlock failed', e);
			}
		});
		/* DOM helpers */
		const $ = id => document.getElementById(id);
		/* Digital clock */
		function updateDigitalClock() {
			const now = new Date();
			let hours = now.getHours();
			const minutes = now.getMinutes();
			const seconds = now.getSeconds();
			const ampm = hours >= 12 ? 'PM' : 'AM';
			hours = hours % 12 || 12;
			const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
			$('digital-clock').innerHTML = `${timeStr} <span style="font-size:40px">${ampm}</span>`;
		}
		setInterval(updateDigitalClock, 1000);
		updateDigitalClock();
		/* Toggle mute/unmute: attempt to unlock audio on unmute (user interaction) */
		$('mute-btn').addEventListener('click', async () => {
			isMuted = !isMuted;
			audio.muted = isMuted;
			$('mute-btn').textContent = isMuted ? '🔇' : '🔊';
			if (!isMuted) {
				try {
					await audio.play();
					audio.pause();
					audio.currentTime = 0;
				} catch (e) {
					/* won't break if autoplay blocked */
				}
			}
		});
		/* Refresh button */
		$('refresh-btn').addEventListener('click', () => {
			if (userCoords) {
				fetchPrayerTimes(selectedDateGlobal);
				fetchWeather(userCoords.latitude, userCoords.longitude);
				location.reload();
			}
		});
		/* Format time to 12h (HH:MM AM/PM), accepts "HH:MM" or "HH:MM:SS" */
		function formatTime12h(timeStr) {
			const parts = timeStr.split(':').map(Number);
			let h = parts[0],
				m = parts[1] || 0; // ← Single || (logical OR)
			const ampm = h >= 12 ? 'PM' : 'AM';
			h = h % 12 || 12;
			return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
		}

		/* Utility to parse time string "HH:MM[:SS]" into Date on given date */
		function getTimeObj(timeStr, date = selectedDateGlobal) {
			const [h, m, s = '0'] = timeStr.split(':').map(Number);
			const t = new Date(date);
			t.setHours(Number(h), Number(m), Number(s || 0), 0);
			return t;
		}
		async function fetchWeather(lat, lon) {
			try {
				const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m&temperature_unit=fahrenheit`;
				const res = await fetch(url);
				const data = await res.json();
				$('weather-temp').textContent = `🌡 ${data.current.temperature_2m}°F`;
				$('weather-wind').textContent = `💨 ${data.current.wind_speed_10m} km/h`;
			} catch {
				$('weather-temp').textContent = '--';
				$('weather-wind').textContent = '--';
			}
		}
		/* Main: fetch prayer times from Aladhan & render */
		async function fetchPrayerTimes(selectedDate = new Date()) {
			if (!navigator.onLine) {
				console.warn('Offline – skipping prayer time fetch');
				$('current-prayer').textContent = 'Offline';
				return;
			}
			if (!userCoords) return;
			if (!userCoords) return;
			selectedDateGlobal = selectedDate;
			// Reset todayPrayerTimes
			todayPrayerTimes = [];
			azanPlayedFor = null; // reset for new day/load
			const lat = userCoords.latitude;
			const lon = userCoords.longitude;
			const method = 2; // you can expose this
			const day = selectedDate.getDate();
			const month = selectedDate.getMonth() + 1;
			const year = selectedDate.getFullYear();
			const url = `https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=${method}&month=${month}&year=${year}&school=1`;
			try {
				const res = await fetch(url);
				const json = await res.json();
				if (!json || json.code !== 200 || !json.data) throw new Error('Aladhan API error');
				const today = json.data[day - 1];
				const timings = today.timings;
				const hijri = today.date.hijri;
				// Format Gregorian date nicely
				const dateObj = new Date(selectedDate);
				const options = {
					weekday: 'short',
					year: 'numeric',
					month: 'long',
					day: 'numeric'
				};
				const formattedDate = dateObj.toLocaleDateString('en-US', {
					weekday: 'short',
					month: 'short',
					day: '2-digit',
					year: 'numeric'
				}).replace(',', '');
				// Example output: Saturday, August 16, 2025
				$('gregorian-date').textContent = formattedDate;
				// Hijri (from API)
				$('hijri-date').textContent = `${hijri.day} ${hijri.month.en} ${hijri.year}`;
				$('hijri-date').textContent = `${hijri.day} ${hijri.month.en} ${hijri.year}`;
				// prayer order (Ishraq derived)
				const prayerOrder = [{
					name: "Imsak 🌙",
					key: "Imsak"
				}, {
					name: "Fajr ✨",
					key: "Fajr"
				}, {
					name: "Sunrise 🌅",
					key: "Sunrise"
				}, {
					name: "Ishraq 🌄",
					key: "Ishraq",
					derived: true,
					afterMinutes: 22
				}, {
					name: "Dhuhr ☀️",
					key: "Dhuhr"
				}, {
					name: "Asr ☁️",
					key: "Asr"
				}, {
					name: "Maghrib 🌇",
					key: "Maghrib"
				}, {
					name: "Isha’a 🌙",
					key: "Isha"
				}];
				const prayerList = $('prayer-list');
				prayerList.innerHTML = '';
				const now = new Date();
				const nowTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());
				todayPrayerTimes = []; // reset
				// Build prayer times array
				for (const prayer of prayerOrder) {
					let timeStr24;
					if (prayer.derived && prayer.key === 'Ishraq') {
						const sunriseRaw = timings['Sunrise'].split(' ')[0]; // HH:MM
						const [sh, sm] = sunriseRaw.split(':').map(Number);
						const total = sh * 60 + sm + (prayer.afterMinutes || 15);
						const ih = Math.floor(total / 60) % 24;
						const im = total % 60;
						timeStr24 = `${String(ih).padStart(2, '0')}:${String(im).padStart(2, '0')}:00`;
					} else {
						if (!timings[prayer.key]) continue;
						timeStr24 = timings[prayer.key].split(' ')[0];
						if (timeStr24.length === 5) timeStr24 += ':00';
					}
					const prayerTime = getTimeObj(timeStr24, selectedDate);
					todayPrayerTimes.push({
						key: prayer.key,
						name: prayer.name,
						time: prayerTime,
						timeStr24
					});
				}
				// 🔹 Render list with NOW & FINISHED logic
				let currentPrayer = null;
				for (let i = 0; i < todayPrayerTimes.length; i++) {
					const prayer = todayPrayerTimes[i];
					const nextPrayer = todayPrayerTimes[i + 1]; // look ahead
					let isNow = false;
					let isFinished = false;
					if (nowTime >= prayer.time) {
						if (!nextPrayer || nowTime < nextPrayer.time) {
							// Between this and next prayer → NOW
							isNow = true;
							currentPrayer = prayer;
						} else {
							// Past this prayer and next one already started → FINISHED
							isFinished = true;
						}
					}
					const item = document.createElement('div');
					item.className = 'prayer-item';
					item.innerHTML = `
        <div>
          ${prayer.name} 
          ${isNow ? '<br><span class="now-tag">Now</span>' : ''}
          ${isFinished ? '<br><span class="finished-tag">End</span>' : ''}
        </div>
        <div>${formatTime12h(prayer.timeStr24)}</div>
      `;
					prayerList.appendChild(item);
				}
				// 🔹 Update current-prayer display
				$('current-prayer').innerHTML = currentPrayer ? `${currentPrayer.name}<br><span style="font-size:0.9em">${formatTime12h(currentPrayer.timeStr24)}</span>` : 'N/A';
				// 🔹 After rendering prayer list and current prayer
				let nextPrayer = todayPrayerTimes.find(p => p.time > nowTime);
				const nextPrayerDisplay = $('next-prayer'); // <div id="next-prayer"></div>
				const countdownEl = $('next-prayer-countdown'); // <div id="next-prayer-countdown"></div>
				if (nextPrayer) {
					const now = new Date();
					let diff = nextPrayer.time - now; // ms
					if (diff < 0) diff = 0;
					const hours = Math.floor(diff / (1000 * 60 * 60));
					const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
					const seconds = Math.floor((diff % (1000 * 60)) / 1000);
					const plainName = nextPrayer.name.replace(/[\u{1F300}-\u{1FAFF}]/gu, '');
					if (countdownEl) {
						countdownEl.textContent = `${plainName} in ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
					}
				} else {
					if (nextPrayerDisplay) {
						nextPrayerDisplay.textContent = 'No more prayers today';
					}
					if (countdownEl) {
						countdownEl.textContent = 'No more prayers today';
					}
				}
			} catch (err) {
				console.error('fetchPrayerTimes error', err);
			}
		}
		/* Calendar UI */
		function showWeek() {
			switchTab('Bi-Weekly');
			const calendar = $('calendar');
			document.getElementById('app').style.display = 'block';
			calendar.innerHTML = '';
			const now = new Date();
			const start = new Date(now);
			start.setDate(now.getDate() - now.getDay());
			for (let i = 0; i < 14; i++) {
				const date = new Date(start);
				date.setDate(start.getDate() + i);
				const isToday = date.toDateString() === (new Date()).toDateString();
				const el = document.createElement('div');
				el.className = `calendar-day ${isToday ? 'active' : ''}`;
				el.innerHTML = `${date.toLocaleDateString('en-US', { weekday: 'short' })}<br>${date.getDate()}`;
				el.addEventListener('click', () => {
					fetchPrayerTimes(date);
					highlightActiveDay(el);
				});
				calendar.appendChild(el);
			}
		}

		function showMonth() {
			switchTab('Month');
			const calendar = $('calendar');
			document.getElementById('app').style.display = 'none';
			calendar.innerHTML = '';
			const now = new Date();
			const year = now.getFullYear(),
				month = now.getMonth();
			const daysInMonth = new Date(year, month + 1, 0).getDate();
			const firstDay = new Date(year, month, 1).getDay();
			for (let i = 0; i < firstDay; i++) {
				const empty = document.createElement('div');
				empty.className = 'calendar-day';
				empty.innerHTML = '&nbsp;';
				calendar.appendChild(empty);
			}
			for (let d = 1; d <= daysInMonth; d++) {
				const date = new Date(year, month, d);
				const isToday = d === now.getDate();
				const el = document.createElement('div');
				el.className = `calendar-day ${isToday ? 'active' : ''}`;
				el.innerHTML = `${date.toLocaleDateString('en-US', { weekday: 'short' })}<br>${d}`;
				el.addEventListener('click', () => {
					fetchPrayerTimes(date);
					highlightActiveDay(el);
				});
				calendar.appendChild(el);
			}
		}

		function highlightActiveDay(sel) {
			document.querySelectorAll('.calendar-day').forEach(e => e.classList.remove('active'));
			sel.classList.add('active');
		}

		function switchTab(tab) {
			document.querySelectorAll('.tabs button').forEach(btn => {
				btn.classList.remove('active');
				if (btn.textContent === tab) btn.classList.add('active');
			});
		}
		/* Interval: check every second to play azan (once per prayer) */
		setInterval(() => {
			if (!todayPrayerTimes.length || isMuted) return;
			const now = new Date();
			for (const p of todayPrayerTimes) {
				const diff = now - p.time; // milliseconds
				// Trigger Azan if it's the exact prayer time within the first 59 seconds
				if (diff >= 0 && diff < 19000 && azanPlayedFor !== p.key) {
					audio.currentTime = 0;
					audio.play().catch(err => {
						console.warn('Audio play blocked. User interaction needed:', err);
						// Optionally show a toast/button to user to enable audio
					});
					azanPlayedFor = p.key;
				}
			}
		}, 1000);
		/* Geolocation and Boot */
		navigator.geolocation.getCurrentPosition(async pos => {
			userCoords = pos.coords;
			// show textual location (reverse geocode)
			try {
				const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${userCoords.latitude}&lon=${userCoords.longitude}`);
				const j = await r.json();
				const place = j.address && (j.address.city || j.address.town || j.address.village || j.address.state) || '';
				$('location').textContent = `\u00A0\u00A0\u00A0\u00A0${place || 'Your Location'}`;
			} catch (e) {
				$('location').textContent = '\u00A0\u00A0\u00A0\u00A0Location Unavailable';
			}
			// fetch weather and prayers
			fetchPrayerTimes(new Date());
			fetchWeather(pos.coords.latitude, pos.coords.longitude);
		}, err => {
			console.error('Geolocation failed', err);
			$('location').textContent = ' Location denied';
		});
		/* Unlock audio if user interacts with page (helps with autoplay policies) */
		document.addEventListener('click', async () => {
			try {
				await audio.play();
				audio.pause();
				audio.currentTime = 0;
			} catch (e) {}
		});
		/* initial calendar */
		showWeek();
		// Auto-refresh data every 60 seconds
		setInterval(() => {
			const now = new Date();
			if (userCoords) {
				fetchPrayerTimes(now);
			}
		}, 300000);
		// Auto-refresh data every 60 seconds
		setInterval(() => {
			const now = new Date();
			if (userCoords) {
				fetchWeather(userCoords.latitude, userCoords.longitude);
			}
		}, 600000);

	</script>
	<script type="text/javascript">
		(function() {
			const surahList = ["Al-Fatiha", "Al-Baqarah", "Al-Imran", "An-Nisa", "Al-Ma'idah", "Al-An'am", "Al-A'raf",
				"Al-Anfal", "At-Tawbah", "Yunus", "Hud", "Yusuf", "Ar-Ra'd", "Ibrahim", "Al-Hijr", "An-Nahl", "Al-Isra", "Al-Kahf",
				"Maryam", "Ta-Ha", "Al-Anbiya", "Al-Hajj", "Al-Mu'minun", "An-Nur", "Al-Furqan", "Ash-Shu'ara", "An-Naml",
				"Al-Qasas", "Al-Ankabut", "Ar-Rum", "Luqman", "As-Sajda", "Al-Ahzab", "Saba", "Fatir", "Ya-Sin", "As-Saffat", "Sad",
				"Az-Zumar", "Ghafir", "Fussilat", "Ash-Shura", "Az-Zukhruf", "Ad-Dukhan", "Al-Jathiya", "Al-Ahqaf", "Muhammad",
				"Al-Fath", "Al-Hujurat", "Qaf", "Adh-Dhariyat", "At-Tur", "An-Najm", "Al-Qamar", "Ar-Rahman", "Al-Waqia",
				"Al-Hadid", "Al-Mujadila", "Al-Hashr", "Al-Mumtahina", "As-Saff", "Al-Jumu'a", "Al-Munafiqun", "At-Taghabun",
				"At-Talaq", "At-Tahrim", "Al-Mulk", "Al-Qalam", "Al-Haqqah", "Al-Ma'arij", "Nuh", "Al-Jinn", "Al-Muzzammil",
				"Al-Muddaththir", "Al-Qiyamah", "Al-Insan", "Al-Mursalat", "An-Naba", "An-Nazi'at", "Abasa", "At-Takwir",
				"Al-Infitar", "Al-Mutaffifin", "Al-Inshiqaq", "Al-Buruj", "At-Tariq", "Al-A'la", "Al-Ghashiya", "Al-Fajr",
				"Al-Balad", "Ash-Shams", "Al-Lail", "Ad-Duha", "Ash-Sharh", "At-Tin", "Al-Alaq", "Al-Qadr", "Al-Bayyina",
				"Az-Zalzalah", "Al-Adiyat", "Al-Qari'a", "At-Takathur", "Al-Asr", "Al-Humaza", "Al-Fil", "Quraish", "Al-Ma'un",
				"Al-Kawthar", "Al-Kafirun", "An-Nasr", "Al-Masad", "Al-Ikhlas", "Al-Falaq", "An-Nas"
			];

			const TOTAL_TRACKS = surahList.length;
			const quranAudio = document.getElementById("audio_quran"); // DIFFERENT name from 'audio'
			const playBtn = document.getElementById("play");
			const prevBtn = document.getElementById("prev");
			const nextBtn = document.getElementById("next");
			const progress = document.getElementById("progress");
			const volume = document.getElementById("volume");
			const surahName = document.getElementById("surah-name");
			const status = document.getElementById("status");

			let currentIndex = Number(localStorage.getItem("surahIndex")) || 1;
			let isPlaying = false;
			let isUnlocked = false;

			// Use DIFFERENT variable name: quranAudio instead of audio
			quranAudio.volume = 0.4;
			quranAudio.playsInline = true;
			volume.value = 0.4;

			function loadTrack(index) {
				const num = String(index).padStart(3, "0"); // ✅ CORRECT!
				const filePath = `quran/${num}.mp3`;

				status.textContent = `🔍 ${surahList[index - 1]}...`;
				surahName.textContent = surahList[index - 1];

				// Reset position for new Surah
				localStorage.setItem("time", "0");
				progress.value = 0;
				quranAudio.currentTime = 0;

				// Just try to load - audio element handles errors gracefully
				quranAudio.src = filePath;
				quranAudio.load();
			}

			function play() {
				quranAudio.play().then(() => {
					playBtn.textContent = "⏸";
					isPlaying = true;
					status.textContent = "Playing";
				}).catch(e => {
					status.textContent = "Click to unlock";
				});
			}

			function pause() {
				quranAudio.pause();
				playBtn.textContent = "▶";
				isPlaying = false;
				status.textContent = "Paused";
			}

			playBtn.onclick = () => {
				isUnlocked = true;
				if (isPlaying) pause();
				else play();
			};

			nextBtn.onclick = () => {
				currentIndex = currentIndex % TOTAL_TRACKS + 1;
				loadTrack(currentIndex);
				localStorage.setItem("surahIndex", currentIndex);
				if (isUnlocked && isPlaying) setTimeout(play, 500);
			};

			prevBtn.onclick = () => {
				currentIndex = currentIndex === 1 ? TOTAL_TRACKS : currentIndex - 1;
				loadTrack(currentIndex);
				localStorage.setItem("surahIndex", currentIndex);
				if (isUnlocked && isPlaying) setTimeout(play, 500);
			};

			volume.oninput = () => quranAudio.volume = volume.value;

			quranAudio.ontimeupdate = () => {
				if (quranAudio.duration && quranAudio.duration > 0) {
					progress.value = (quranAudio.currentTime / quranAudio.duration) * 100;
					localStorage.setItem("time", quranAudio.currentTime);
				}
			};

			progress.oninput = () => {
				if (quranAudio.duration) {
					quranAudio.currentTime = (progress.value / 100) * quranAudio.duration;
				}
			};

			quranAudio.onloadedmetadata = () => {
				status.textContent = "Ready";
			};

			quranAudio.onended = () => {
				nextBtn.click();
			};

			quranAudio.onerror = () => {
				status.textContent = `❌ quran/${String(currentIndex).padStart(3, "0")}.mp3 not found`;
				console.error(`Quran file missing: quran/${String(currentIndex).padStart(3, "0")}.mp3`);
			};


			// Unlock Quran audio
			document.addEventListener('click', function unlockQuran() {
				if (!isUnlocked) {
					quranAudio.play().then(() => {
						quranAudio.pause();
						isUnlocked = true;
					}).catch(() => {});
					document.removeEventListener('click', unlockQuran);
				}
			}, {
				once: true
			});

			// Load initial track
			loadTrack(currentIndex);
		})();


		function refreshAllDataHourly() {
			if (!userCoords) return;

			const now = new Date();

			// Refresh prayer times for selected date (or today)
			fetchPrayerTimes(selectedDateGlobal || now);

			// Refresh weather
			fetchWeather(userCoords.latitude, userCoords.longitude);

			console.log('[Hourly Refresh]', now.toLocaleTimeString());
		}

		// Run once immediately after load
		setTimeout(refreshAllDataHourly, 3000);

		// Then every 1 hour (3600000 ms)
		setInterval(refreshAllDataHourly, 60 * 60 * 1000);

		/* ===============================
	   FULLSCREEN TOGGLE
	   =============================== */

		const fsBtn = document.getElementById('fullscreen-btn');

		function toggleFullscreen() {
			if (!document.fullscreenElement) {
				document.documentElement.requestFullscreen().catch(err => {
					console.warn('Fullscreen failed:', err);
				});
			} else {
				document.exitFullscreen();
			}
		}

		fsBtn.addEventListener('click', toggleFullscreen);

		// Update icon when fullscreen changes
		document.addEventListener('fullscreenchange', () => {
			fsBtn.textContent = document.fullscreenElement ? '⤢' : '⛶';
		});

	</script>
