<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Quran Audio Player</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: linear-gradient(135deg, #111 0%, #2d1b69 50%, #1a1a2e 100%);
			color: #fff;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 20px;
		}

		.player {
			background: rgba(31, 31, 31, 0.95);
			backdrop-filter: blur(20px);
			padding: 30px;
			border-radius: 24px;
			max-width: 360px;
			width: 100%;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
			border: 1px solid rgba(255, 107, 107, 0.1);
			text-align: center;
		}

		.surah-title {
			font-size: 18px;
			font-weight: 600;
			margin-bottom: 24px;
			color: #fff;
		}

		.surah-subtitle {
			font-size: 12px;
			opacity: 0.7;
			margin-top: 4px;
		}

		.controls {
			display: flex;
			justify-content: center;
			gap: 16px;
			margin-bottom: 24px;
		}

		button {
			width: 60px;
			height: 60px;
			border: none;
			border-radius: 50%;
			background: linear-gradient(145deg, #ff6b6b, #ff8e8e);
			color: white;
			font-size: 20px;
			cursor: pointer;
			transition: all 0.3s ease;
			box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 12px 25px rgba(255, 107, 107, 0.4);
		}

		.play-btn {
			width: 72px;
			height: 72px;
			font-size: 24px;
			background: linear-gradient(145deg, #4ecdc4, #44a08d);
			box-shadow: 0 10px 25px rgba(78, 205, 196, 0.4);
		}

		.play-btn:hover {
			box-shadow: 0 15px 30px rgba(78, 205, 196, 0.5);
		}

		.slider-row {
			display: flex;
			align-items: center;
			gap: 12px;
			margin: 16px 0;
		}

		input[type="range"] {
			flex: 1;
			height: 8px;
			border-radius: 8px;
			background: #444;
			cursor: pointer;
			-webkit-appearance: none;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 20px;
			height: 20px;
			background: #ff6b6b;
			border-radius: 50%;
			cursor: pointer;
		}

		.status {
			font-size: 12px;
			color: #aaa;
			margin-top: 12px;
			font-family: monospace;
		}

		@media (max-width: 480px) {
			.player {
				margin: 10px;
				padding: 20px;
			}
		}

	</style>
</head>

<body>
	<div class="player">
		<audio id="audio_quran" preload="metadata"></audio>

		<div class="surah-title">
			Surah <span id="surah-name">Al-Fatiha</span>
			<div class="surah-subtitle">Mishari Al-afasi</div>
		</div>

		<div class="controls">
			<button id="prev" title="Previous">⏮</button>
			<button id="play" class="play-btn" title="Play/Pause">▶</button>
			<button id="next" title="Next">⏭</button>
		</div>

		<div class="slider-row">
			<span>⏳</span>
			<input type="range" id="progress" min="0" max="100" value="0" step="0.1">
		</div>

		<div class="slider-row">
			<span>🔊</span>
			<input type="range" id="volume" min="0" max="1" step="0.01" value="0.4">
		</div>

		<div class="status" id="status">Ready</div>
	</div>

	<script src="scripts/quran.js" type="text/javascript">

	</script>
</body>

</html>
