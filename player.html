<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Simple Numbered Player</title>


	<style>
		body {
			background: #111;
			color: #fff;
			font-family: sans-serif;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}

		.player {
			background: #1f1f1f;
			padding: 20px;
			border-radius: 12px;
			width: 320px;
			color: white;
			font-family: sans-serif;
		}

		.controls {
			display: flex;
			justify-content: center;
			gap: 12px;
			margin-bottom: 12px;
		}

		button {
			width: 52px;
			height: 52px;
			border: none;
			border-radius: 50%;
			background: #ff6b6b;
			color: white;
			font-size: 18px;
			cursor: pointer;
			transition: 0.2s;
		}

		button:hover {
			background: #ff8787;
		}

		.slider-row {
			display: flex;
			align-items: center;
			gap: 8px;
			margin: 10px 0;
		}

		input[type="range"] {
			flex: 1;
			appearance: none;
			height: 6px;
			border-radius: 6px;
			background: #444;
			cursor: pointer;
		}

		input[type="range"]::-webkit-slider-thumb {
			appearance: none;
			width: 14px;
			height: 14px;
			background: #ff6b6b;
			border-radius: 50%;
		}

		.track-label {
			text-align: center;
			font-size: 13px;
			color: #ccc;
		}

	</style>

</head>

<body>

	<div class="player">
		<audio id="audio_quran"></audio>

		<div class="controls">
			<button id="prev">⏮</button>
			<button id="play">▶</button>
			<button id="next">⏭</button>
		</div>

		<div class="slider-row">
			<input type="range" id="progress" min="0" max="100" value="0">
		</div>

		<div class="slider-row">
			<span>🔊</span>
			<input type="range" id="volume" min="0" max="1" step="0.01">
		</div>

		<p class="track-label">Surah <span id="surah-name">Al-Fatiha</span> | Mishari Al-afasi </p>
	</div>

	<script type="text/javascript" src="scripts/quran.js"></script>


</body>

</html>
