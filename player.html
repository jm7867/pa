<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quran Audio Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 40px auto;
            text-align: center;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            margin-top: 10px;
        }
        #surah {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Quran Player</h2>

<audio id="player" controls playsinline></audio>

<div id="surah"></div>

<button id="playBtn">Play / Resume</button>

<script>
    const audio = document.getElementById("player");
    const surahText = document.getElementById("surah");
    const playBtn = document.getElementById("playBtn");

    const TOTAL_SURAHS = 114;
    const AUDIO_PATH = "quran/";

    let currentSurah = parseInt(localStorage.getItem("surah")) || 1;
    let savedTime = parseFloat(localStorage.getItem("time")) || 0;

    function pad(num) {
        return num.toString().padStart(3, "0");
    }

    function loadSurah() {
        audio.src = AUDIO_PATH + pad(currentSurah) + ".mp3";
        surahText.textContent = "Surah: " + pad(currentSurah);
    }

    loadSurah();

    playBtn.addEventListener("click", async () => {
        try {
            if (audio.readyState >= 1) {
                audio.currentTime = savedTime;
            }
            await audio.play();
        } catch (err) {
            alert("Tap Play again to start audio");
        }
    });

    audio.addEventListener("timeupdate", () => {
        localStorage.setItem("surah", currentSurah);
        localStorage.setItem("time", audio.currentTime);
    });

    audio.addEventListener("ended", () => {
        if (currentSurah < TOTAL_SURAHS) {
            currentSurah++;
            savedTime = 0;
            loadSurah();
            audio.play(); // allowed after user gesture
        }
    });
</script>

</body>
</html>
