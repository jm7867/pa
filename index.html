<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>السلام عليكم</title>
	<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #0a0c14;
			font-family: 'Amiri', serif;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* ── starfield ── */
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			z-index: 0;
			background:
				radial-gradient(ellipse at 20% 20%, rgba(201, 168, 76, 0.08) 0%, transparent 55%),
				radial-gradient(ellipse at 80% 80%, rgba(46, 139, 122, 0.07) 0%, transparent 55%);
			pointer-events: none;
		}

		body::after {
			content: '';
			position: fixed;
			inset: 0;
			z-index: 0;
			opacity: .04;
			background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9a84c' stroke-width='.8'%3E%3Cpolygon points='40,4 76,22 76,58 40,76 4,58 4,22'/%3E%3Cpolygon points='40,16 64,28 64,52 40,64 16,52 16,28'/%3E%3Cline x1='40' y1='4' x2='40' y2='16'/%3E%3Cline x1='76' y1='22' x2='64' y2='28'/%3E%3Cline x1='76' y1='58' x2='64' y2='52'/%3E%3Cline x1='40' y1='76' x2='40' y2='64'/%3E%3Cline x1='4' y1='58' x2='16' y2='52'/%3E%3Cline x1='4' y1='22' x2='16' y2='28'/%3E%3C/g%3E%3C/svg%3E");
			background-size: 80px 80px;
			pointer-events: none;
		}

		.stars {
			position: fixed;
			inset: 0;
			z-index: 0;
			pointer-events: none;
			overflow: hidden;
		}

		.star {
			position: absolute;
			border-radius: 50%;
			background: #fff;
			animation: twinkle var(--d, 3s) ease-in-out infinite;
		}

		@keyframes twinkle {

			0%,
			100% {
				opacity: var(--lo, .05)
			}

			50% {
				opacity: var(--hi, .5)
			}
		}

		/* ── scene ── */
		.scene {
			position: relative;
			z-index: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 32px;
			animation: sceneIn .8s cubic-bezier(.22, 1, .36, 1) both;
		}

		@keyframes sceneIn {
			from {
				opacity: 0;
				transform: scale(.88)
			}

			to {
				opacity: 1;
				transform: scale(1)
			}
		}

		/* ── outer spinning ring ── */
		.ring-wrap {
			position: relative;
			width: 280px;
			height: 280px;
		}

		.ring {
			position: absolute;
			inset: 0;
			border-radius: 50%;
			border: 1.5px solid transparent;
			background:
				linear-gradient(var(--bg, #0a0c14), var(--bg, #0a0c14)) padding-box,
				conic-gradient(from 0deg, #c9a84c, #3dab98, #c9a84c) border-box;
			animation: spin 8s linear infinite;
		}

		.ring.ring2 {
			inset: 10px;
			background:
				linear-gradient(var(--bg, #0a0c14), var(--bg, #0a0c14)) padding-box,
				conic-gradient(from 180deg, #3dab98, #c9a84c, #3dab98) border-box;
			animation: spin 12s linear infinite reverse;
			border-width: 1px;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg)
			}
		}

		/* ── crescent icon in center ── */
		.icon-wrap {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.crescent {
			font-size: 64px;
			line-height: 1;
			filter: drop-shadow(0 0 18px rgba(201, 168, 76, .6));
			animation: pulse 3s ease-in-out infinite;
		}

		@keyframes pulse {

			0%,
			100% {
				filter: drop-shadow(0 0 14px rgba(201, 168, 76, .5))
			}

			50% {
				filter: drop-shadow(0 0 28px rgba(201, 168, 76, .9));
				transform: scale(1.06)
			}
		}

		/* ── Arabic text arc ── */
		.arc-text {
			position: absolute;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.arc-text svg {
			position: absolute;
			inset: 0;
		}

		/* ── main greeting text ── */
		.greeting-wrap {
			text-align: center;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 10px;
		}

		.greeting-top {
			font-size: 14px;
			font-weight: 400;
			letter-spacing: 4px;
			text-transform: uppercase;
			color: rgba(201, 168, 76, .5);
			animation: fadeSlide 1s .4s both;
		}

		.greeting-main {
			font-size: clamp(26px, 6vw, 42px);
			font-weight: 700;
			color: #f5e4b0;
			line-height: 1.4;
			text-shadow: 0 0 40px rgba(201, 168, 76, .4);
			animation: fadeSlide 1s .6s both;
			direction: rtl;
		}

		.greeting-sub {
			font-size: clamp(14px, 3vw, 18px);
			font-weight: 400;
			color: rgba(160, 144, 112, .8);
			animation: fadeSlide 1s .8s both;
			direction: rtl;
		}

		@keyframes fadeSlide {
			from {
				opacity: 0;
				transform: translateY(16px)
			}

			to {
				opacity: 1;
				transform: none
			}
		}

		/* ── gold divider ── */
		.divider {
			width: 180px;
			height: 1px;
			background: linear-gradient(90deg, transparent, #c9a84c, transparent);
			animation: fadeSlide 1s 1s both;
		}

		/* ── progress bar ── */
		.progress-wrap {
			width: 220px;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 8px;
			animation: fadeSlide 1s 1.1s both;
		}

		.progress-track {
			width: 100%;
			height: 3px;
			background: rgba(201, 168, 76, .12);
			border-radius: 3px;
			overflow: hidden;
		}

		.progress-bar {
			height: 100%;
			width: 0%;
			border-radius: 3px;
			background: linear-gradient(90deg, #c9a84c, #3dab98);
			animation: fill 3.2s .5s cubic-bezier(.4, 0, .2, 1) forwards;
		}

		@keyframes fill {
			to {
				width: 100%
			}
		}

		.redirect-lbl {
			font-size: 11px;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: rgba(201, 168, 76, .4);
			direction: ltr;
			font-family: 'Jost', sans-serif;
		}

		/* ── fade-out overlay ── */
		.fade-out {
			position: fixed;
			inset: 0;
			z-index: 999;
			background: #0a0c14;
			opacity: 0;
			pointer-events: none;
			transition: opacity .7s ease;
		}

		.fade-out.active {
			opacity: 1;
		}

	</style>
</head>

<body>

	<div class="stars" id="stars"></div>

	<div class="scene">

		<!-- Spinning rings + crescent -->
		<div class="ring-wrap">
			<div class="ring"></div>
			<div class="ring ring2"></div>

			<!-- SVG arc text spinning slowly -->
			<div class="arc-text">
				<svg viewBox="0 0 280 280" width="280" height="280" style="animation:spin 20s linear infinite;position:absolute;inset:0;">
					<defs>
						<path id="topArc" d="M 30,140 A 110,110 0 0,1 250,140" />
						<path id="botArc" d="M 30,140 A 110,110 0 0,0 250,140" />
					</defs>
					<text font-family="Amiri,serif" font-size="13" fill="rgba(201,168,76,0.55)" letter-spacing="2">
						<textPath href="#topArc" startOffset="50%" text-anchor="middle">
							﷽ &nbsp;&nbsp; بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ &nbsp;&nbsp; ﷽
						</textPath>
					</text>
					<text font-family="Amiri,serif" font-size="13" fill="rgba(46,139,122,0.5)" letter-spacing="2">
						<textPath href="#botArc" startOffset="50%" text-anchor="middle">
							✦ &nbsp; الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ &nbsp; ✦
						</textPath>
					</text>
				</svg>
			</div>

			<div class="icon-wrap">
				<span class="crescent">☽</span>
			</div>
		</div>

		<!-- Greeting text -->
		<div class="greeting-wrap">
			<div class="greeting-top">Welcome · أهلاً وسهلاً</div>

			<div class="greeting-main">وَعَلَيْكُمُ السَّلَامُ</div>
			<div class="greeting-main" style="font-size:clamp(18px,4vw,28px);animation-delay:.75s">
				وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ
			</div>

			<div class="divider"></div>

			<div class="greeting-sub">And upon you be peace, the mercy of Allah and His blessings</div>
		</div>

		<!-- Progress -->
		<div class="progress-wrap">
			<div class="progress-track">
				<div class="progress-bar"></div>
			</div>
			<div class="redirect-lbl">Entering Local Prayer Times…</div>
		</div>

	</div>

	<!-- fade-out cover -->
	<div class="fade-out" id="fadeOut"></div>

	<script>
		// Stars
		const sc = document.getElementById('stars');
		for (let i = 0; i < 80; i++) {
			const s = document.createElement('div');
			s.className = 'star';
			const sz = Math.random() * 2 + 0.4;
			s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;--lo:${(Math.random()*0.04).toFixed(2)};
      --hi:${(Math.random()*0.5+0.2).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s`;
			sc.appendChild(s);
		}

		// Redirect after ~3.8s with fade
		setTimeout(() => {
			const fo = document.getElementById('fadeOut');
			fo.classList.add('active');
			setTimeout(() => {
				window.location.href = 'i3.html';
			}, 750);
		}, 3200);

	</script>
</body>

</html>
