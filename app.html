<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Prayer Times App</title>

	<style>
		body {
			margin: 0;
			font-family: 'Segoe UI', sans-serif;
			background: #062c25;
			color: white;
			padding: 20px;
		}

		.container {
			max-width: 420px;
			margin: auto;
		}

		.date-box {
			/*
			display: flex;
			justify-content: center;
			align-items: center;
			text-align: center;
			position: relative;
*/
			text-align: center;
			padding: 1px;
		}

		.location {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin: 10px 0;
			padding: 10px;
			font-size: 14px;
			gap: 6px;
			flex-wrap: wrap;
		}

		h3 {
			margin: 10px;
		}

		.card {
			background: #0b3c33;
			padding: 13px;
			border-radius: 16px;
			margin-top: 10px;
			height: 135px;
			display: flex;
			justify-content: space-between;
			/*			gap: 20px;*/
			flex-wrap: wrap;
			margin-bottom: 10px;
		}

		.card-section {
			color: yellow;
			font-weight: 600;
		}

		.card h2 {
			margin: 0;
			font-size: 32px;
		}

		.prayer-list {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
		}

		.prayer-item {
			background: #0e463a;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 16px;
			border-radius: 12px;
			width: calc(50% - 10px);
			box-sizing: border-box;
		}

		.progress-section {
			margin-top: 30px;
		}

		.tabs {
			display: flex;
			justify-content: center;
			gap: 10px;
			margin-bottom: 10px;
		}

		.tabs button {
			background: #083e34;
			color: white;
			border: none;
			padding: 8px 16px;
			border-radius: 20px;
			cursor: pointer;
		}

		.tabs .active {
			background: white;
			color: #083e34;
		}

		.calendar {
			display: flex;
			flex-wrap: wrap;
			justify-content: flex-start;
		}

		.calendar-day {
			width: 10.28%;
			text-align: left;
			font-size: 12px;
			margin: 4px;
			cursor: pointer;
			display: flex;
			justify-content: center;
			align-items: center;
			flex-direction: column;
		}

		.calendar-day.active {
			background: white;
			color: black;
			padding: 1px;
			border-radius: 10px;
		}

		#digital-clock {
			font-size: 2vw;
			text-align: right;
			font-weight: bolder;
			color: goldenrod;
			position: relative;
			top: -10px;
			margin: 0;
		}

		@media (max-width: 600px) {
			#digital-clock {
				font-size: 9vw;
				top: 0;
			}
		}

		.search-info {
			font-size: 11px;
			color: #ddd;
			margin-left: 4px;
		}

		input[type="text"],
		select {
			background: #083e34;
			color: white;
			border-radius: 6px;
			border: 1px solid #0f594b;
			padding: 3px 6px;
			font-size: 11px;
		}

		button.small-btn {
			background: #0c5143;
			color: white;
			border: none;
			border-radius: 6px;
			padding: 4px 8px;
			cursor: pointer;
			font-size: 11px;
		}

		.location-settings {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 6px;
			flex-wrap: wrap;
			margin: 10px auto;
			font-size: 12px;
		}

		.location-settings input,
		.location-settings select {
			background: #083e34;
			color: white;
			border: none;
			border-radius: 8px;
			padding: 6px 8px;
			font-size: 12px;
			outline: none;
		}

		.location-settings input {
			width: 90px;
		}

		.location-settings select {
			max-width: 160px;
		}

		.location-settings input::placeholder {
			color: #b6d2cc;
		}

		.small-btn {
			background: #0e463a;
			color: white;
			border: none;
			border-radius: 8px;
			padding: 6px 10px;
			font-size: 12px;
			cursor: pointer;
			white-space: nowrap;
		}

		.small-btn:hover {
			background: #147a66;
		}

		.ampm {
			font-size: 15px;
			color: white;

			position: relative;
			top: -13px;
			left: 4px;
		}

		/* Button */
		.prayer-btn {
			padding: 10px 18px;
			position: fixed;
			right: 10px;
			bottom: 10px;
			border: none;
			border-radius: 8px;
			background: #2d2d2d;
			color: #fff;
			cursor: pointer;
			font-size: 16px;
		}

		/* Popup (hidden by default) */
		.settings-popup {
			display: none;
			margin-top: 10px;
		}


		/* Popup box */
		.prayer-content-settings {
			background: black;
			width: 419px;
			padding: 20px;
			border-radius: 14px;
			position: absolute;
			top: 20vw;
			text-align: center;
			box-shadow: 0 14px 35px rgba(0, 0, 0, 0.2);

			/* Correct transition */
			transition: all 0.3s ease;
		}


		/* Close button */
		.close-btn {
			position: absolute;
			top: 2px;
			right: 12px;
			font-size: 24px;
			cursor: pointer;
			color: white;
		}

		/* Mobile optimization */
		@media (max-width: 480px) {
			.location-settings {
				gap: 5px;
			}

			.location-settings select {
				width: 100%;
			}
		}

	</style>

	<link href="https://fonts.googleapis.com/css?family=Bitter:400,700&display=swap&subset=latin-ext" rel="stylesheet" />
	<link rel="stylesheet" href="css/main.css" />
</head>

<body>
	<div class="container">

		<h4 style="text-align: center;  font-family: " Segoe UI", Tahoma, Arial, "Noto Naskh Arabic" , "Amiri" , sans-serif; ">بِسْمِ اللَّهِ الرَّحْمَـٰنِ الرَّحِيمِ</h4>

		<div class=" card">
			<div class="card-section" style="text-align: left;">
				<strong>Now</strong>
				<h2 id="current-prayer">--</h2>
			</div>
			<div class="card-section">
				<p id="digital-clock"></p>
				<div class="date-box">
					<span id="gregorian-date">Today</span>
					<hr>
					<span id="hijri-date">Hijri Date</span>
				</div>

			</div>
	</div>

	<button id="open-settings" class="prayer-btn">⚙️</button>

	<div id="prayer-modal" class="settings-popup">

		<div class="prayer-content-settings">
			<span class="close-btn" id="close-settings">&times;</span>
			<div class="location">
				<span id="location">📍 Getting location...</span>
				<button id="change-location" style="background:#083e34;color:white;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;">
					Reset
				</button>
			</div>
			<hr>

			<!-- City / country / method settings -->
			<div class="location-settings">
				<input type="text" id="cityInput" placeholder="City" style="width:90px;">
				<input type="text" id="countryInput" placeholder="Country" style="width:70px;">
				<select id="methodSelect" title="Calculation method">
					<option value="2">ISNA (North America)</option>
					<option value="0">Karachi (South Asia)</option>
					<option value="1">MWL</option>
					<option value="3">ISNA (Alternate)</option>
					<option value="4">Umm al-Qura</option>
					<option value="5">Egyptian Authority</option>
					<option value="7">UOIF (France)</option>
					<option value="8">Gulf Region</option>
					<option value="9">Kuwait</option>
					<option value="12">Qatar</option>
					<option value="13">Singapore</option>
					<option value="99">Custom</option>
				</select>

				<button id="useCityBtn" class="small-btn">Use city</button>
				<button id="useGeoBtn" class="small-btn">Use my location</button>
				<span id="locationLabel" class="search-info"></span>
			</div>
		</div>
	</div>

	<div class="prayer-list" id="prayer-list"></div>


	<hr>
	<div class="progress-section">
		<div class="tabs">
			<button class="active" onclick="showWeek()">Week</button>
			<button onclick="showMonth()">Month</button>
		</div>
		<div class="cal_main">
			<div class="calendar" id="calendar"></div>
			<br>
			<div class="wrapper" id="app" style="padding-left:0px;">
				<div class="player">
					<div class="player__top">
						<div class="player-controls">
							<div class="player-controls__item" @click="prevTrack">
								⏮️
							</div>
							<div class="player-controls__item -xl js-play" @click="play">
								{{ isTimerPlaying ? '⏸️' : '▶️' }}
							</div>
							<div class="player-controls__item" @click="nextTrack">
								⏭️
							</div>
						</div>
					</div>

					<div class="progress" ref="progress">
						<div class="progress__top">
							<div class="album-info" v-if="currentTrack">
								<span class="album-info__name">{{ currentTrack.artist }}</span> |
								<span class="album-info__track">{{ currentTrack.name }}</span> |
								<span class="progress__duration">{{ duration }}</span>
							</div>
							<div class="progress__bar" @click="clickProgress">
								<div class="progress__current" :style="{ width : barWidth }"></div>
							</div>
							<div class="progress__time">{{ currentTime }}</div>
						</div>
						<div v-cloak></div>
					</div>

				</div>
			</div>
		</div>
	</div>
	</div>

	<script>
		// Digital clock
		function updateDigitalClock() {
			const now = new Date();
			let hours = now.getHours();
			const minutes = now.getMinutes();
			const seconds = now.getSeconds();
			const ampm = hours >= 12 ? "P" : "A";
			hours = hours % 12 || 12;

			const timeStr = `${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
			document.getElementById("digital-clock").innerHTML = timeStr + "<span class='ampm'>" + ampm + "<span>";
		}
		setInterval(updateDigitalClock, 1000);
		updateDigitalClock();

		function formatTime12h(timeStr) {
			let parts = timeStr.split(":");
			let hour = Number(parts[0]);
			let minute = Number(parts[1]);
			let second = parts.length > 2 ? Number(parts[2]) : 0;
			const ampm = hour >= 12 ? "PM" : "AM";
			hour = hour % 12 || 12;
			return `${hour}:${minute.toString().padStart(2, "0")} ${ampm}`;
		}

		// Global state
		let userCoords = null;
		let useCityMode = false;
		let userCity = "";
		let userCountry = "";
		let userMethod = 2; // default ISNA

		async function fetchPrayerTimes(selectedDate = new Date()) {
			// Offline guard
			if (!navigator.onLine) {
				console.warn("Offline: cannot fetch prayer times.");
				document.getElementById("locationLabel").textContent = "Offline – showing last loaded data (if any)";
				return;
			}

			const day = selectedDate.getDate();
			const month = selectedDate.getMonth() + 1;
			const year = selectedDate.getFullYear();

			let url;

			if (useCityMode && userCity && userCountry) {
				// By city
				url = `https://api.aladhan.com/v1/calendarByCity/${year}/${month}` +
					`?city=${encodeURIComponent(userCity)}` +
					`&country=${encodeURIComponent(userCountry)}` +
					`&method=${userMethod}&school=1`;
			} else {
				// By coordinates
				if (!userCoords) return;
				const lat = userCoords.latitude;
				const lon = userCoords.longitude;
				const method = userMethod || 2;
				url = `https://api.aladhan.com/v1/calendar?latitude=${lat}&longitude=${lon}&method=${method}&month=${month}&year=${year}&school=1`;
			}

			try {
				const res = await fetch(url);
				const data = await res.json();

				const today = data.data[day - 1];
				const timings = today.timings;
				const hijriDate = today.date.hijri;

				const weekday = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
				const d = new Date(selectedDate);
				const dayName = weekday[d.getDay()];
				const readableDate = `${dayName}, ${today.date.readable}`;

				document.getElementById('gregorian-date').textContent = readableDate;
				document.getElementById('hijri-date').textContent =
					`${hijriDate.day} ${hijriDate.month.en} ${hijriDate.year}`;

				const prayerOrder = [{
						name: "Imsak 🌙",
						key: "Imsak"
					},
					{
						name: "Fajr ✨",
						key: "Fajr"
					},
					{
						name: "Sunrise 🌅",
						key: "Sunrise"
					},
					{
						name: "Ishraq 🌄",
						key: "Ishraq",
						derived: true
					},
					{
						name: "Dhuhr ☀️",
						key: "Dhuhr"
					},
					{
						name: "Asr ☁️",
						key: "Asr"
					},
					{
						name: "Maghrib 🌇",
						key: "Maghrib"
					},
					{
						name: "Isha’a 🌙",
						key: "Isha"
					}
				];

				const prayerList = document.getElementById("prayer-list");
				prayerList.innerHTML = "";

				const now = new Date();
				const nowTime = new Date(
					selectedDate.getFullYear(),
					selectedDate.getMonth(),
					selectedDate.getDate(),
					now.getHours(),
					now.getMinutes(),
					now.getSeconds()
				);

				let nextPrayer = null;
				let currentPrayer = null;

				const getTimeObj = (timeStr) => {
					let [h, m, s = "0"] = timeStr.split(":");
					const t = new Date(selectedDate);
					t.setHours(Number(h), Number(m), Number(s));
					return t;
				};

				for (let i = 0; i < prayerOrder.length; i++) {
					const prayer = prayerOrder[i];
					let timeStr24;

					if (prayer.derived && prayer.key === "Ishraq") {
						const sunriseTimeStr = timings["Sunrise"].split(" ")[0];
						let [h, m] = sunriseTimeStr.split(":").map(Number);
						m += 22;
						if (m >= 60) {
							h += 1;
							m -= 60;
						}
						timeStr24 = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:00`;
					} else {
						timeStr24 = timings[prayer.key].split(" ")[0];
						if (timeStr24.length === 5) timeStr24 += ":00";
					}

					const prayerTime = getTimeObj(timeStr24);

					if (nowTime < prayerTime && !nextPrayer) {
						nextPrayer = {
							...prayer,
							timeStr24,
							time: prayerTime
						};
					}
					if (nowTime >= prayerTime) {
						currentPrayer = {
							...prayer,
							timeStr24,
							time: prayerTime
						};
					}

					const item = document.createElement("div");
					item.className = "prayer-item";
					item.innerHTML =
						`<span>${prayer.name}</span><span>${formatTime12h(timeStr24)}</span>`;
					prayerList.appendChild(item);
				}

				document.getElementById("current-prayer").innerHTML =
					`<span>${currentPrayer?.name || "--"}</span><br>` +
					`<span>${currentPrayer ? formatTime12h(currentPrayer.timeStr24) : ""}</span>`;

			} catch (e) {
				console.error("Prayer fetch error", e);
				document.getElementById("locationLabel").textContent = "Error fetching prayer times";
			}
		}

		function showWeek() {
			switchTab("Week");
			const calendar = document.getElementById("calendar");
			document.getElementById('app').style.display = 'block';
			calendar.innerHTML = "";
			const now = new Date();
			const start = new Date(now);
			start.setDate(now.getDate() - now.getDay());
			for (let i = 0; i < 7; i++) {
				const date = new Date(start);
				date.setDate(start.getDate() + i);
				const isToday = date.toDateString() === now.toDateString();
				const el = document.createElement("div");
				el.className = `calendar-day ${isToday ? 'active' : ''}`;
				el.innerHTML = `${date.toLocaleDateString('en-US', { weekday: 'short' })}<br>${date.getDate()}`;
				el.addEventListener("click", () => {
					fetchPrayerTimes(date);
					highlightActiveDay(el);
				});
				calendar.appendChild(el);
			}
		}

		function highlightActiveDay(selectedEl) {
			const allDays = document.querySelectorAll(".calendar-day");
			allDays.forEach(el => el.classList.remove("active"));
			selectedEl.classList.add("active");
		}

		function showMonth() {
			switchTab("Month");
			const calendar = document.getElementById("calendar");
			document.getElementById('app').style.display = 'none';
			calendar.innerHTML = "";
			const now = new Date();
			const year = now.getFullYear();
			const month = now.getMonth();
			const daysInMonth = new Date(year, month + 1, 0).getDate();
			const firstDay = new Date(year, month, 1).getDay();
			for (let i = 0; i < firstDay; i++) {
				const empty = document.createElement("div");
				empty.className = "calendar-day";
				empty.innerHTML = "&nbsp;";
				calendar.appendChild(empty);
			}
			for (let d = 1; d <= daysInMonth; d++) {
				const date = new Date(year, month, d);
				const isToday = d === now.getDate();
				const el = document.createElement("div");
				el.className = `calendar-day ${isToday ? 'active' : ''}`;
				el.innerHTML = `${date.toLocaleDateString('en-US', { weekday: 'short' })}<br>${d}`;
				el.addEventListener("click", () => {
					fetchPrayerTimes(date);
					highlightActiveDay(el);
				});
				calendar.appendChild(el);
			}
		}

		function switchTab(tab) {
			const buttons = document.querySelectorAll(".tabs button");
			buttons.forEach(btn => {
				btn.classList.remove("active");
				if (btn.textContent === tab) btn.classList.add("active");
			});
		}

		async function displayLocation(coords) {
			if (!navigator.onLine) {
				document.getElementById("location").textContent = "📍 Offline";
				return;
			}
			try {
				const locRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${coords.latitude}&lon=${coords.longitude}`);
				const locData = await locRes.json();
				document.getElementById("location").textContent =
					`📍 ${locData.address.city || locData.address.town || locData.address.village || 'Your Location'}`;
			} catch (e) {
				console.error("Location reverse lookup error", e);
				document.getElementById("location").textContent = "📍 Location Unavailable";
			}
		}

		// Load saved settings
		const savedCityMode = localStorage.getItem("useCityMode");
		const savedCity = localStorage.getItem("userCity");
		const savedCountry = localStorage.getItem("userCountry");
		const savedMethod = localStorage.getItem("userMethod");

		if (savedMethod) {
			userMethod = Number(savedMethod);
			const methodSelect = document.getElementById("methodSelect");
			if (methodSelect) methodSelect.value = String(userMethod);
		}

		if (savedCityMode === "true" && savedCity && savedCountry) {
			useCityMode = true;
			userCity = savedCity;
			userCountry = savedCountry;
			document.getElementById("cityInput").value = userCity;
			document.getElementById("countryInput").value = userCountry;
			document.getElementById("location").textContent =
				`📍 ${userCity}, ${userCountry}`;
			document.getElementById("locationLabel").textContent = "Using city/country mode";
			fetchPrayerTimes();
		} else {
			const savedLocation = localStorage.getItem("userCoords");
			if (savedLocation) {
				userCoords = JSON.parse(savedLocation);
				displayLocation(userCoords);
				document.getElementById("locationLabel").textContent = "Using GPS location";
				fetchPrayerTimes();
			} else {
				navigator.geolocation.getCurrentPosition(async (pos) => {
					userCoords = pos.coords;
					localStorage.setItem("userCoords", JSON.stringify(userCoords));
					displayLocation(userCoords);
					document.getElementById("locationLabel").textContent = "Using GPS location";
					fetchPrayerTimes();
				}, (err) => {
					alert("Location access denied. Enter city/country or click 'Use my location' again.");
					document.getElementById("location").textContent = "📍 Location not set";
				});
			}
		}

		// Button: use city
		document.getElementById("useCityBtn").addEventListener("click", () => {
			const cityVal = document.getElementById("cityInput").value.trim();
			const countryVal = document.getElementById("countryInput").value.trim();
			const methodVal = document.getElementById("methodSelect").value;

			if (!cityVal || !countryVal) {
				alert("Please enter both city and country.");
				return;
			}

			useCityMode = true;
			userCity = cityVal;
			userCountry = countryVal;
			userMethod = Number(methodVal);

			localStorage.setItem("useCityMode", "true");
			localStorage.setItem("userCity", userCity);
			localStorage.setItem("userCountry", userCountry);
			localStorage.setItem("userMethod", String(userMethod));

			document.getElementById("location").textContent =
				`📍 ${userCity}, ${userCountry}`;
			document.getElementById("locationLabel").textContent = "Using city/country mode";

			fetchPrayerTimes();
		});

		// Button: use my location
		document.getElementById("useGeoBtn").addEventListener("click", () => {
			useCityMode = false;
			localStorage.setItem("useCityMode", "false");

			const savedLocation = localStorage.getItem("userCoords");
			if (savedLocation) {
				userCoords = JSON.parse(savedLocation);
				displayLocation(userCoords);
				document.getElementById("locationLabel").textContent = "Using GPS location";
				fetchPrayerTimes();
			} else {
				navigator.geolocation.getCurrentPosition(async (pos) => {
					userCoords = pos.coords;
					localStorage.setItem("userCoords", JSON.stringify(userCoords));
					displayLocation(userCoords);
					document.getElementById("locationLabel").textContent = "Using GPS location";
					fetchPrayerTimes();
				}, (err) => {
					alert("Location access denied.");
					document.getElementById("location").textContent = "📍 Location not set";
				});
			}
		});

		// Reset everything
		document.getElementById("change-location").addEventListener("click", () => {
			localStorage.removeItem("userCoords");
			localStorage.removeItem("useCityMode");
			localStorage.removeItem("userCity");
			localStorage.removeItem("userCountry");
			localStorage.removeItem("userMethod");
			alert("Location settings reset! Reloading...");
			location.reload();
		});

		// Initial calendar
		showWeek();


		//popup model
		const openBtn = document.getElementById("open-settings");
		const closeBtn = document.getElementById("close-settings");
		const modal = document.getElementById("prayer-modal");

		openBtn.addEventListener("click", () => {
			modal.style.display = "block";
		});

		closeBtn.addEventListener("click", () => {
			modal.style.display = "none";
		});

	</script>

	<script src="https://cdn.jsdelivr.net/npm/vue@2.6.10/dist/vue.min.js"></script>
	<script src="./scripts/script.js"></script>
</body>

</html>
